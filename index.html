/* ============================ Mini Calendar ============================ */
function MiniCalendar({ style, onClose, noFooter, onChange, initialStart, initialEnd }){
  const [vYear,setVYear] = useState(2026);
  const [vMonth,setVMonth] = useState(5); // June
  const [start,setStart] = useState(initialStart||null);
  const [end,setEnd] = useState(initialEnd||null);
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const WDAYS=["S","M","T","W","T","F","S"];
  const firstDay=new Date(vYear,vMonth,1).getDay();
  const daysInMonth=new Date(vYear,vMonth+1,0).getDate();
  const daysInPrev=new Date(vYear,vMonth,0).getDate();
  const cells=[];
  for(let i=firstDay-1;i>=0;i--) cells.push({d:daysInPrev-i,type:'prev'});
  for(let d=1;d<=daysInMonth;d++) cells.push({d,type:'cur'});
  const rem=cells.length%7;
  if(rem>0) for(let d=1;d<=7-rem;d++) cells.push({d,type:'next'});
  const fmt=(dt)=>`${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}/${dt.getFullYear()}`;
  const prevMo=()=>{ if(vMonth===0){setVMonth(11);setVYear(y=>y-1);}else setVMonth(m=>m-1); };
  const nextMo=()=>{ if(vMonth===11){setVMonth(0);setVYear(y=>y+1);}else setVMonth(m=>m+1); };
  const click=(cell)=>{
    if(cell.type!=='cur') return;
    const dt=new Date(vYear,vMonth,cell.d);
    let ns=start, ne=end;
    if(!start||(start&&end)){ ns=dt; ne=null; }
    else{ if(dt<start){ne=start;ns=dt;}else ne=dt; }
    setStart(ns); setEnd(ne);
    onChange&&onChange({start:ns,end:ne});
  };
  const isSel=(cell)=>{
    if(cell.type!=='cur') return false;
    const dt=new Date(vYear,vMonth,cell.d);
    return (start&&dt.toDateString()===start.toDateString())||(end&&dt.toDateString()===end.toDateString());
  };
  const isRange=(cell)=>{
    if(!start||!end||cell.type!=='cur') return false;
    const dt=new Date(vYear,vMonth,cell.d);
    return dt>start&&dt<end;
  };
  return (
    <div className="mini-cal" style={style} onClick={e=>e.stopPropagation()}>
      <div className="mc-header">
        <span className="mc-month">{MONTHS[vMonth]} {vYear}</span>
        <button className="mc-nav" onClick={prevMo}><i className="ri-arrow-left-s-line"></i></button>
        <button className="mc-nav" onClick={nextMo}><i className="ri-arrow-right-s-line"></i></button>
      </div>
      <div className="mc-fields">
        <div className="mc-field">
          <div className="mc-field-label">Start</div>
          <input className="mc-field-input" readOnly value={start?fmt(start):''} placeholder="MM/DD/YYYY"/>
        </div>
        <div className="mc-field">
          <div className="mc-field-label">End</div>
          <input className="mc-field-input" readOnly value={end?fmt(end):''} placeholder="MM/DD/YYYY"/>
        </div>
      </div>
      <div className="mc-grid">
        <div className="mc-week-row">
          {WDAYS.map((d,i)=><div key={i} className="mc-wday">{d}</div>)}
        </div>
        {Array.from({length:Math.ceil(cells.length/7)},(_,row)=>(
          <div key={row} className="mc-day-row">
            {cells.slice(row*7,row*7+7).map((cell,ci)=>(
              <div key={ci} className={"mc-day"+(isRange(cell)?" mc-range-cell":"")} onClick={()=>click(cell)}>
                <div className={"mc-day-inner"+(cell.type!=='cur'?" mc-other":"")+(isSel(cell)?" mc-sel":"")+(isRange(cell)?" mc-range":"")}>
                  {cell.d}
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
      {!noFooter && (
        <div className="mc-footer">
          <button className="mc-btn" onClick={onClose}>Cancel</button>
          <button className="mc-btn primary" onClick={onClose}>Apply</button>
        </div>
      )}
    </div>
  );
}

/* ============================ Toolbar ============================ */
function FilterMenu({ filters, setFilters, cat, setCat, onClose, onSave, cats, style }){
  const _cats = cats || FILTER_CATS;
  const [q,setQ] = useState("");
  const [showPicker,setShowPicker] = useState(false);
  const [pendingRange,setPendingRange] = useState({start:null,end:null});
  const [appliedRange,setAppliedRange] = useState({start:null,end:null});
  const rawCount = _cats.reduce((n,c)=> n+(filters[c.id]?.length||0), 0);
  const customPending = (filters.date||[]).includes('custom') && !appliedRange.start;
  const count = rawCount - (customPending ? 1 : 0);
  const toggle = (catId,id)=> setFilters(f=>{
    const arr=f[catId]||[], has=arr.includes(id);
    return {...f,[catId]: has?arr.filter(x=>x!==id):[...arr,id]};
  });
  const radioChange = (id)=>{
    if(id==='custom'){
      setFilters(f=>({...f, date:['custom']}));
      setPendingRange(appliedRange);
      setShowPicker(true);
    } else {
      setFilters(f=>({...f, date: id==='none'?[]:[id]}));
      setShowPicker(false);
    }
  };
  const handlePickerApply = ()=>{
    setAppliedRange(pendingRange);
    setFilters(f=>({...f, dateRange: pendingRange}));
    setShowPicker(false);
  };
  const handlePickerCancel = ()=>{
    setShowPicker(false);
    if(!appliedRange.start) setFilters(f=>({...f, date:[], dateRange:null}));
  };
  const options = cat==="member"
    ? MEMBERS.map(m=>({id:m.id,label:m.name,av:AV[m.id]}))
    : cat==="tag"
    ? Object.entries(TAGS).map(([k,t])=>({id:k,label:t.label,tag:t.color}))
    : cat==="project"
    ? PROJECTS.map(p=>({id:p.id,label:p.name,prefix:p.prefix,icon:"ri-stack-line"}))
    : [{id:'none',label:'None'},...DATE_OPTS.map(d=>({id:d.id,label:d.label}))];
  const filtered = options.filter(o=>o.label.toLowerCase().includes(q.toLowerCase()));
  const clearAll = ()=>{
    setFilters(f=>{ const r={...f}; _cats.forEach(c=>r[c.id]=[]); return {...r, dateRange:null}; });
    setAppliedRange({start:null,end:null});
    setShowPicker(false);
  };
  const fmtDt=(dt)=>{
    if(!dt) return '';
    const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${M[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
  };
  const isPickerCat = cat==='date';
  const customApplied = appliedRange.start && (filters.date||[]).includes('custom');
  return (
    <>
      <div className="fm-overlay" onClick={onClose}></div>
      <div className="filter-menu" style={style} onClick={e=>e.stopPropagation()}>
        <div className="fm-search">
          <i className="ri-search-line"></i>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search across all categories..."/>
        </div>
        <div className="fm-body" style={showPicker&&isPickerCat?{maxHeight:'none'}:{}}>
          <div className="fm-cats">
            {_cats.map(c=>(
              <div key={c.id} className={"fm-cat"+(cat===c.id?" active":"")} onClick={()=>{setCat(c.id);setQ(""); if(c.id!=='date') setShowPicker(false);}}>
                <i className={c.icon}></i>
                <span className="fm-cat-label">{c.label}</span>
                {(filters[c.id]?.length||0)>0 && <span className="fm-cat-count">{filters[c.id].length}</span>}
                <i className="ri-arrow-right-s-line fm-chev"></i>
              </div>
            ))}
          </div>
          <div className="fm-options" style={showPicker&&isPickerCat?{overflowY:'visible'}:{}}>
            {filtered.map(o=>{
              const isDate = cat==='date';
              const isCustom = isDate && o.id==='custom';
              const checked = isDate
                ? (o.id==='none' ? (filters.date||[]).length===0 : (filters.date||[]).includes(o.id))
                : (filters[cat]||[]).includes(o.id);
              const onChg = isDate ? ()=>radioChange(o.id) : ()=>toggle(cat,o.id);
              const isCustomApplied = isCustom && customApplied;
              return (
                <label key={o.id} className="fm-opt" style={isCustomApplied?{alignItems:'flex-start'}:{}}>
                  <input type={isDate?"radio":"checkbox"} checked={checked} onChange={onChg}
                    style={isCustomApplied?{marginTop:3}:{}}/>
                  {o.tag ? (
                    <span className="tag" style={{background:`var(--${o.tag}-bg)`,color:`var(--${o.tag}-text)`}}>
                      <span className="tag-dot"></span>{o.label}
                    </span>
                  ) : isCustom ? (
                    <div style={{display:'flex',flexDirection:'column',flex:1,minWidth:0}}>
                      <span className="fm-opt-label">{o.label}</span>
                      {isCustomApplied && (
                        <span style={{fontSize:11,color:'var(--text-quaternary)',lineHeight:'16px',marginTop:1}}>
                          {fmtDt(appliedRange.start)}{appliedRange.end?` – ${fmtDt(appliedRange.end)}`:''}
                        </span>
                      )}
                    </div>
                  ) : (
                    <>
                      {o.av && <Avatar data={o.av} size={20}/>}
                      {o.icon && <i className={o.icon} style={{fontSize:16,color:"var(--text-tertiary)",margin:"0 2px"}}></i>}
                      <span className="fm-opt-label">
                        {o.prefix&&<span style={{color:"var(--text-tertiary)",fontWeight:400,marginRight:4}}>{o.prefix}</span>}
                        {o.label}
                      </span>
                    </>
                  )}
                  {isCustomApplied && (
                    <i className="ri-pencil-line" style={{fontSize:14,color:'var(--text-quaternary)',marginLeft:'auto',flexShrink:0,marginTop:3,cursor:'pointer'}}
                      onClick={e=>{e.preventDefault();e.stopPropagation();setPendingRange(appliedRange);setShowPicker(true);}}></i>
                  )}
                </label>
              );
            })}
            {filtered.length===0 && <div className="fm-empty">No matches</div>}
            {showPicker && isPickerCat && (
              <>
                <div className="mc-picker-card">
                  <MiniCalendar
                    noFooter
                    initialStart={pendingRange.start}
                    initialEnd={pendingRange.end}
                    onChange={setPendingRange}
                    style={{border:'none',boxShadow:'none',borderRadius:0,padding:0,width:'auto'}}
                    onClose={handlePickerCancel}
                  />
                  <div style={{display:'flex',gap:8,marginTop:8}}>
                    <button className="fm-btn" style={{flex:1,height:32}} onClick={handlePickerCancel}>Cancel</button>
                    <button className="fm-btn primary" style={{flex:1,height:32}} onClick={handlePickerApply}>Apply</button>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
        <div className="fm-footer">
          <span className="fm-applied">{count} filter{count===1?"":"s"} applied</span>
          <div className="fm-actions">
            <button className="fm-btn" disabled={count===0} onClick={clearAll}>Clear all</button>
            <button className={"fm-btn"+(count>0?" primary":"")} disabled={count===0} onClick={onSave||onClose}>Save view</button>
          </div>
        </div>
      </div>
    </>
  );
}

const memHandle = (name)=>{ const p=(name||"").toLowerCase().replace(/[^a-z ]/g,"").split(/\s+/).filter(Boolean); return "@"+(p.length>1?p[0][0]+p[p.length-1]:(p[0]||"")); };
function AvatarGroup({ filters, setFilters }){
  const [members,setMembers] = useState(MEMBERS.map(m=>m.id));
  const [menuOpen,setMenuOpen] = useState(false);
  const [menuMode,setMenuMode] = useState("filter"); // 'filter' | 'add'
  const [search,setSearch] = useState("");
  const [addSel,setAddSel] = useState([]);
  const toggleFilter = (id)=> setFilters(f=>{
    const has=f.member.includes(id);
    return {...f, member: has?f.member.filter(x=>x!==id):[...f.member,id]};
  });
  const shown = members.slice(0,8);
  const hidden = members.length - shown.length;
  const unassigned = MORE_MEMBERS.filter(m=>!members.includes(m.id));
  const openFilter = ()=>{ setMenuMode("filter"); setSearch(""); setMenuOpen(true); };
  const openAdd = ()=>{ setMenuMode("add"); setSearch(""); setAddSel([]); setMenuOpen(true); };
  const confirmAdd = ()=>{ if(addSel.length) setMembers(ms=>[...ms,...addSel]); setMenuOpen(false); };
  const q = search.trim().toLowerCase();
  const filterList = members.filter(id=> !q || (MEMBER_NAME[id]||id).toLowerCase().includes(q));
  const addListItems = unassigned.filter(m=> !q || m.name.toLowerCase().includes(q));
  return (
    <div className="av-group">
      {shown.map(id=>(
        <button key={id} className={"av-btn"+(filters.member.includes(id)?" active":"")}
          onClick={()=>toggleFilter(id)} title={MEMBER_NAME[id]||id}>
          <Avatar data={AV[id]} size={32}/>
        </button>
      ))}
      {hidden>0 &&
        <button className={"av-more"+(menuOpen&&menuMode==="filter"?" active":"")} onClick={openFilter} title="Show all members">+{hidden}</button>}
      <div className="av-addwrap">
        <button className={"av-add"+(menuOpen&&menuMode==="add"?" active":"")} onClick={openAdd} title="Add member">
          <i className="ri-add-line" style={{fontSize:16}}></i></button>
        {menuOpen && <>
          <div className="fm-overlay" onClick={()=>setMenuOpen(false)}></div>
          <div className="mem-menu">
            <div className="mem-search">
              <i className="ri-search-line"></i>
              <input placeholder="Search across all members..." value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
            </div>
            <div className="mem-list">
              {menuMode==="filter" ? (<>
                {filterList.map(id=>{
                  const active=filters.member.includes(id);
                  return (
                    <button key={id} className={"mem-opt"+(active?" active":"")} onClick={()=>toggleFilter(id)}>
                      <span className="mem-opt-inner">
                        <Avatar data={AV[id]} size={20}/>
                        <div className="mem-opt-text">
                          <span className="mem-opt-name">{MEMBER_NAME[id]}</span>
                          <span className="mem-opt-handle">{memHandle(MEMBER_NAME[id])}</span>
                        </div>
                        {active && <i className="ri-check-line mem-opt-check"></i>}
                      </span>
                    </button>
                  );
                })}
                {filterList.length===0 && <div className="mem-empty">No members found</div>}
              </>) : (<>
                {addListItems.map(m=>{
                  const checked=addSel.includes(m.id);
                  return (
                    <button key={m.id} className="mem-opt" onClick={()=>setAddSel(s=>checked?s.filter(x=>x!==m.id):[...s,m.id])}>
                      <span className="mem-opt-inner">
                        <span className={"mem-check"+(checked?" checked":"")}>{checked && <i className="ri-check-line"></i>}</span>
                        <Avatar data={AV[m.id]} size={20}/>
                        <div className="mem-opt-text">
                          <span className="mem-opt-name">{m.name}</span>
                          <span className="mem-opt-handle">{memHandle(m.name)}</span>
                        </div>
                      </span>
                    </button>
                  );
                })}
                {addListItems.length===0 && <div className="mem-empty">No members to add</div>}
              </>)}
            </div>
            <div className="mem-footer">
              {menuMode==="filter"
                ? <button className="mem-add-btn" onClick={()=>{ setMenuMode("add"); setSearch(""); setAddSel([]); }}><i className="ri-add-line"></i>Add member</button>
                : <>
                    <button className="mem-cancel" onClick={()=>setMenuOpen(false)}>Cancel</button>
                    <button className="mem-apply" onClick={confirmAdd} disabled={addSel.length===0}>Add</button>
                  </>}
            </div>
          </div>
        </>}
      </div>
    </div>
  );
}

function Toolbar({ filterOpen, setFilterOpen, filters, setFilters, filterCat, setFilterCat, filterCount, onSaveView, infoOpen, onToggleInfo, display, setDisplay }){
  const dispBtnRef = useRef(null);
  const [dispOpen, setDispOpen] = useState(false);

  useEffect(()=>{ if(!dispOpen) return; const c=()=>setDispOpen(false); document.addEventListener("click",c); return ()=>document.removeEventListener("click",c); },[dispOpen]);
  const openDisp = e=>{ e.stopPropagation(); const r=dispBtnRef.current.getBoundingClientRect(); setDispPos({top:r.bottom+4, left:r.right-240}); setDispOpen(o=>!o); };
  const toggleCol = key => setDisplay(d=>({...d,[key]: d[key]===false ? true : false}));
  return (
    <div className="toolbar">
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div className="filter-wrap">
          <button className={"tb-btn"+(filterOpen?" active":"")} onClick={()=>setFilterOpen(o=>!o)}>
            <i className="ri-filter-3-line"></i><span className="btn-label">Filter</span>
            {filterCount>0 && <span className="tb-badge">{filterCount}</span>}
          </button>
          {filterOpen && <FilterMenu filters={filters} setFilters={setFilters} cat={filterCat} setCat={setFilterCat}
            onClose={()=>setFilterOpen(false)}

        </div>
      </div>
      <div style={{display:"flex",gap:16,alignItems:"center"}}>
        <AvatarGroup filters={filters} setFilters={setFilters}/>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div className="filter-wrap">
            <button ref={dispBtnRef} className={"tb-btn"+(dispOpen?" active":"")} onClick={openDisp}><i className="ri-equalizer-line"></i><i className="ri-arrow-down-s-line"></i></button>
            {dispOpen && <>
              <div className="fm-overlay" onClick={()=>setDispOpen(false)}/>
              <div className="disp-menu" style={{position:"fixed",top:dispPos.top,left:dispPos.left}} onClick={e=>e.stopPropagation()}>
                {DISPLAY_COLS.map((c,i)=>{
                  if(c==="divider") return <div key={"d"+i} className="disp-divider"/>;
                  const disabled = c.dependsOn && display[c.dependsOn]===false;
                  const on = display[c.key]!==false;
                  return (
                    <button key={c.key} className={"disp-opt"+(disabled?" disabled":"")} disabled={disabled}
                      onClick={()=>{ if(!disabled) toggleCol(c.key); }}>
                      <span className="disp-label">{c.label}</span>
                      <span className={"sg-toggle"+(on?" on":"")+(disabled?" disabled":"")}><span className="knob"></span></span>
                    </button>
                  );
                })}
              </div>
            </>}
          </div>
          <button className={"icon-btn"+(infoOpen?" active":"")} style={infoOpen?{border:"1px solid var(--border-brand)",boxShadow:"0 0 0 2px var(--focus-ring)"}:{border:"1px solid var(--border-secondary)",boxShadow:"var(--shadow-xs)"}} onClick={onToggleInfo}>
            <i className="ri-information-line"></i></button>
        </div>
      </div>
    </div>
  );
}

function CardMenu({ pos, onClose }){
  const ref = useRef(null);
  useEffect(()=>{
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown', handler);
    return ()=> document.removeEventListener('mousedown', handler);
  }, []);
  return ReactDOM.createPortal(
    <div ref={ref} className="card-menu" style={{position:'absolute',top:pos.top,left:pos.left,zIndex:1000}}>
      {CARD_MENU_ITEMS.map((item,i)=> item==='divider'
        ? <div key={i} className="menu-divider"/>
        : (
          <div key={i} className="menu-item" onClick={onClose}>
            <div className="menu-item-inner">
              <i className={item.icon+(item.destructive?' destructive-icon':'')}></i>
              <span className={"menu-item-label"+(item.destructive?' destructive':'')}>{item.label}</span>
              {item.submenu && <i className="ri-arrow-right-s-line menu-item-chevron"></i>}
            </div>
          </div>
        )
      )}
    </div>,
    document.body
  );
}

/* ============================ Ticket card ============================ */
function Ticket({ card, onDragStart, onDragEnd, dragging, onOpen }){
  const display = useContext(DisplayCtx) || {};
  const shown = k => display[k] !== false;
  const dueDateRef = useRef(null);
  const moreButtonRef = useRef(null);
  const [calOpen, setCalOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [menuPos, setMenuPos] = useState({top:0,left:0});
  const handleCalBtnClick = e => {
    e.stopPropagation();
    dueDateRef.current && dueDateRef.current.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true}));
  };
  const handleMoreBtnClick = e => {
    e.stopPropagation();
    if (moreButtonRef.current){
      const r = moreButtonRef.current.getBoundingClientRect();
      setMenuPos({top: r.bottom + 4 + window.scrollY, left: r.right - 240 + window.scrollX});
    }
    setMenuOpen(o=>!o);
  };
  return (
    <div
      className={"ticket"+(dragging?" dragging":"")}
      draggable
      onDragStart={onDragStart}
      onDragEnd={onDragEnd}
      onClick={onOpen}
    >
      <div className="tk-actions" onClick={e=>e.stopPropagation()}>
        <button className="tk-act" title="Assign"><i className="ri-user-3-line"></i></button>
        <button className={"tk-act"+(calOpen?" active":"")} title="Due date" onClick={handleCalBtnClick}><i className="ri-calendar-line"></i></button>
        <button className="tk-act" title="Estimate"><i className="ri-bar-chart-line"></i></button>
        <button ref={moreButtonRef} className={"tk-act"+(menuOpen?" active":"")} title="More" onClick={handleMoreBtnClick}><i className="ri-more-line"></i></button>
      </div>
      {card.cover && <div className="tk-cover" style={{backgroundImage:`url(${card.cover})`}}/>}
      <div className="tk-body">
        <div className="tk-text">
          {shown("id") && <div className="tk-code">{card.code}</div>}
          <div className="tk-title">{card.title}</div>
        </div>
        <div className="tk-props">
          {shown("due") && <DueDateTag ref={dueDateRef} due={`${card.start} – ${card.end}`} onOpenChange={setCalOpen}/>}
          {shown("estimate") && <span className="prop"><i className="ri-bar-chart-line"></i>{card.points} pts</span>}
          {shown("logged") && card.time && card.time!=="0 h" &&
            <span className="prop"><i className="ri-time-line"></i>{card.time}</span>}
        </div>
        {shown("members") && shown("assignees") && <div className="tk-assignees">
          {card.assignees.map(a=><Avatar key={a} data={AV[a]} size={20}/>)}
        </div>}
        {shown("tags") && <div className="tags">
          {card.tags.map(t=><Tag key={t} data={tag(t)} full={shown("fulltags")}/>)}
        </div>}
        <div className="tk-details">
          <div className="d"><i className="ri-align-left"></i></div>
          {shown("comments") && <div className="d"><i className="ri-discuss-line"></i>{card.comments}</div>}
          {shown("tasks") && <div className="d"><i className="ri-checkbox-circle-line"></i>{card.done}/{card.total}</div>}
          {shown("attach") && <div className="d"><i className="ri-attachment-2"></i>{card.attach}</div>}
        </div>
      </div>
      {menuOpen && <CardMenu pos={menuPos} onClose={()=>setMenuOpen(false)}/>}
    </div>
  );
}

/* ============================ Column ============================ */
function Column({ col, title, cards, onAdd, onRename, onCardDragStart, onCardDragEnd, onDropCard, draggingId, dragOver, onDragEnterCol, onDragLeaveCol, onOpenCard }){
  const [adding,setAdding] = useState(false);
  const [val,setVal] = useState("");
  const inputRef = useRef(null);
  useEffect(()=>{ if(adding && inputRef.current) inputRef.current.focus(); },[adding]);

  const [editingTitle,setEditingTitle] = useState(false);
  const [draft,setDraft] = useState(title);
  const titleRef = useRef(null);
  useEffect(()=>{ if(editingTitle){ setDraft(title); if(titleRef.current){ titleRef.current.focus(); titleRef.current.select(); } } },[editingTitle]);
  const saveTitle = ()=>{ const v=draft.trim(); if(v) onRename && onRename(v); setEditingTitle(false); };

  const [moreOpen,setMoreOpen] = useState(false);

  const submit = ()=>{
    const v = val.trim();
    if(v){ onAdd(col.id, v); }
    setVal(""); setAdding(false);
  };

  return (
    <div className="column">
      <div className="col-head">
        {editingTitle ? (
          <div className="col-rename">
            <input ref={titleRef} className="col-rename-input" value={draft}
              onChange={e=>setDraft(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") saveTitle(); if(e.key==="Escape") setEditingTitle(false); }}
              onBlur={()=>setEditingTitle(false)}/>
            <button className="col-rename-save" onMouseDown={e=>e.preventDefault()} onClick={saveTitle}>Save</button>
          </div>
        ) : (
          <>
            <div className="col-title-wrap" onClick={()=>setEditingTitle(true)} title="Rename column">
              <span className="col-title">{title}</span>
              <span className="col-count">{cards.length}</span>
            </div>
            <div className="col-actionrow">
              <span className="col-meta">{cards.length} cards, {cards.reduce((a,c)=>a+c.points,0)} points</span>
              <button className="col-more" onClick={e=>{e.stopPropagation();setMoreOpen(o=>!o);}}><i className="ri-more-line"></i></button>
              {moreOpen && <>
                <div className="fm-overlay" onClick={()=>setMoreOpen(false)}/>
                <div className="col-ctx-menu" onClick={e=>e.stopPropagation()}>
                  <div className="col-ctx-item" onClick={()=>setMoreOpen(false)}><div className="col-ctx-wrap"><span className="col-ctx-icon"><i className="ri-add-line"></i></span><span className="col-ctx-label">Add new column</span></div></div>
                  <div className="col-ctx-divider"/>
                  <div className="col-ctx-item" onClick={()=>{ setMoreOpen(false); setEditingTitle(true); }}><div className="col-ctx-wrap"><span className="col-ctx-icon"><i className="ri-edit-line"></i></span><span className="col-ctx-label">Rename column</span></div></div>
                  <div className="col-ctx-item" onClick={()=>setMoreOpen(false)}><div className="col-ctx-wrap"><span className="col-ctx-icon"><i className="ri-time-line"></i></span><span className="col-ctx-label">Set WIP limit</span></div></div>
                  <div className="col-ctx-divider"/>
                  <div className="col-ctx-item" onClick={()=>setMoreOpen(false)}><div className="col-ctx-wrap"><span className="col-ctx-icon"><i className="ri-arrow-up-down-line"></i></span><span className="col-ctx-label">Sort by Due date</span></div></div>
                  <div className="col-ctx-item" onClick={()=>setMoreOpen(false)}><div className="col-ctx-wrap"><span className="col-ctx-icon"><i className="ri-share-forward-line"></i></span><span className="col-ctx-label">Move stories to backlog</span></div></div>
                  <div className="col-ctx-divider"/>
                  <div className="col-ctx-item" onClick={()=>setMoreOpen(false)}><div className="col-ctx-wrap"><span className="col-ctx-icon"><i className="ri-delete-bin-line"></i></span><span className="col-ctx-label">Delete column</span></div></div>
                </div>
              </>}
            </div>
          </>
        )}
      </div>
      <div
        className={"col-body"+(dragOver?" drag-over":"")}
        onDragOver={(e)=>e.preventDefault()}
        onDragEnter={()=>onDragEnterCol(col.id)}
        onDragLeave={(e)=>{ if(!e.currentTarget.contains(e.relatedTarget)) onDragLeaveCol(col.id); }}
        onDrop={()=>onDropCard(col.id)}
      >
        {cards.map(card=>(
          <Ticket key={card.code} card={card}
            dragging={draggingId===card.code}
            onDragStart={(e)=>{ e.dataTransfer.effectAllowed="move"; onCardDragStart(card.code, col.id); }}
            onDragEnd={onCardDragEnd}
            onOpen={()=>onOpenCard(card)}
          />
        ))}
        {adding &&
          <div className="ticket"><div className="tk-body" style={{gap:8}}>
            <textarea ref={inputRef} value={val} rows={2}
              onChange={e=>setVal(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit();} if(e.key==="Escape"){setAdding(false);setVal("");} }}
              onBlur={submit}
              placeholder="Enter a title…"
              style={{width:"100%",border:"none",resize:"none",outline:"none",font:"inherit",fontSize:14,
                background:"transparent",color:"var(--text-primary)"}}/>
          </div></div>}
      </div>
      <div className="col-foot">
        <button className="add-card" onClick={()=>setAdding(true)}>
          <i className="ri-add-line"></i> Add new card
        </button>
      </div>
    </div>
  );
}

/* ============================ Board view ============================ */
function BoardView({ data, setData, onOpenCard, filterFn }){
  const [draggingId,setDraggingId] = useState(null);
  const dragFrom = useRef(null);
  const [dragOverCol,setDragOverCol] = useState(null);
  const [titles,setTitles] = useState(()=>Object.fromEntries(COLUMNS.map(c=>[c.id,c.title])));

  const onCardDragStart = (code, fromCol)=>{ setDraggingId(code); dragFrom.current = fromCol; };
  const onCardDragEnd = ()=>{ setDraggingId(null); dragFrom.current=null; setDragOverCol(null); };

  const onDropCard = (toCol)=>{
    const code = draggingId, fromCol = dragFrom.current;
    if(!code || !fromCol){ setDragOverCol(null); return; }
    if(fromCol===toCol){ setDragOverCol(null); return; }
    setData(prev=>{
      const next = {...prev};
      const card = prev[fromCol].find(c=>c.code===code);
      if(!card) return prev;
      next[fromCol] = prev[fromCol].filter(c=>c.code!==code);
      const moved = {...card};
      if(toCol==="done"){ moved.done = moved.total; }
      next[toCol] = [moved, ...prev[toCol]];
      return next;
    });
    setDragOverCol(null);
  };

  const addCard = (colId, title)=>{
    setData(prev=>{
      const n = Object.values(prev).reduce((a,arr)=>a+arr.length,0);
      const card = { code:"CFW-"+(510+n), title, start:"May 8", end:"May 12", points:5,
        time:"0 h", assignees:["aa"], tags:["improve"], comments:0, done:0, total:0, attach:0 };
      return {...prev, [colId]:[...prev[colId], card]};
    });
  };

  return (
    <div className="board-wrap">
      <div className="board">
        {COLUMNS.map(col=>(
          <Column key={col.id} col={col} title={titles[col.id]} cards={(data[col.id]||[]).filter(filterFn||(()=>true))}
            onAdd={addCard}
            onRename={(name)=>setTitles(t=>({...t,[col.id]:name}))}
            onCardDragStart={onCardDragStart}
            onCardDragEnd={onCardDragEnd}
            onDropCard={onDropCard}
            draggingId={draggingId}
            dragOver={dragOverCol===col.id}
            onDragEnterCol={(id)=>setDragOverCol(id)}
            onDragLeaveCol={(id)=>setDragOverCol(c=>c===id?null:c)}
            onOpenCard={onOpenCard}
          />
        ))}
      </div>
    </div>
  );
}

/* ============================ Other tab views ============================ */
function ReportsView({ data }){
  const all = Object.values(data).flat();
  const totalCards = all.length;
  const totalPoints = all.reduce((a,c)=>a+c.points,0);
  const donePoints = (data.done||[]).reduce((a,c)=>a+c.points,0);
  const maxC = Math.max(...COLUMNS.map(c=>(data[c.id]||[]).length),1);
  return (
    <div className="view-pad">
      <div className="stat-grid">
        <div className="stat"><div className="n">{totalCards}</div><div className="l">Total cards</div></div>
        <div className="stat"><div className="n">{totalPoints}</div><div className="l">Total points</div></div>
        <div className="stat"><div className="n">{(data.done||[]).length}</div><div className="l">Completed</div></div>
        <div className="stat"><div className="n">{Math.round(donePoints/totalPoints*100)||0}%</div><div className="l">Points delivered</div></div>
      </div>
      <div className="panel">
        <div className="section-title">Cards by status</div>
        {COLUMNS.map(c=>{
          const n=(data[c.id]||[]).length;
          return (
            <div className="bar-row" key={c.id}>
              <div className="lab">{c.title}</div>
              <div className="bar-track"><div className="bar-fill" style={{width:(n/maxC*100)+"%",background:c.color}}></div></div>
              <div className="v">{n}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CalendarView({ data }){
  // place cards roughly by their "end" day in May for illustration
  const all = Object.values(data).flat();
  const byDay = {};
  all.forEach(c=>{
    const m = /([A-Za-z]+)\s+(\d+)/.exec(c.end||"");
    if(m && m[1].startsWith("May")){ const d=+m[2]; (byDay[d]=byDay[d]||[]).push(c); }
  });
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  // May 2026 starts on Friday (offset 5)
  const offset=5, total=31;
  const cells=[];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1;d<=total;d++) cells.push(d);
  while(cells.length%7) cells.push(null);
  return (
    <div className="view-pad">
      <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>May 2026</div>
      <div className="cal">
        {days.map(d=><div className="cal-h" key={d}>{d}</div>)}
        {cells.map((d,i)=>(
          <div className={"cal-d"+(d?"":" muted")} key={i}>
            {d && <span className="dn">{d}</span>}
            {(byDay[d]||[]).map(c=><span className="cal-chip" key={c.code} title={c.title}>{c.code}: {c.title}</span>)}
          </div>
        ))}
      </div>
    </div>
  );
}

function DeliveredView({ data, onOpenCard }){
  const done = data.done||[];
  return (
    <div className="view-pad">
      <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>Delivered ({done.length})</div>
      {done.length===0
        ? <div className="empty"><i className="ri-inbox-line"></i>Nothing delivered yet</div>
        : <div className="dlist">
            {done.map(c=>(
              <div className="drow" key={c.code} onClick={()=>onOpenCard(c)} style={{cursor:"pointer"}}>
                <i className="ri-checkbox-circle-fill chk"></i>
                <span className="code">{c.code}</span>
                <span className="t">{c.title}</span>
                <span className="prop"><i className="ri-bar-chart-line"></i>{c.points} pts</span>
              </div>
            ))}
          </div>}
    </div>
  );
}

/* ============================ Info panel ============================ */
function InfoPanel({ open, onClose, activityDisabled, className }){
  const [tab, setTab] = useState(activityDisabled?"Tags":"Activity");
  const [tagSearch, setTagSearch] = useState("");
  const [collapsed, setCollapsed] = useState({});
  const [selectedTags, setSelectedTags] = useState([]);
  const [tagMenu, setTagMenu] = useState(null);
  const [tagGroups, setTagGroups] = useState(INFO_TAG_GROUPS);
  const [tagEdit, setTagEdit] = useState(null); // {gid, name, value, isNew}
  const [sMenu, setSMenu] = useState(null); // search-row dropdown {type:'add'|'more', x, y}
  const [showArchived, setShowArchived] = useState(false);
  const grpSeq = useRef(0);
  const toggleSection = id => setCollapsed(c=>({...c,[id]:!c[id]}));
  const toggleTag = key => setSelectedTags(prev => prev.includes(key) ? prev.filter(k=>k!==key) : [...prev, key]);
  const openTagMenu = (gid, name, e) => {
    e.stopPropagation();
    const key = gid+":"+name;
    const r = e.currentTarget.getBoundingClientRect();
    setTagMenu(prev => prev && prev.key===key ? null : { key, gid, name, x:r.right, y:r.bottom+4 });
  };
  const [colorPicker, setColorPicker] = useState(null); // {gid, name, x, y, mode}
  const [hsl, setHsl] = useState({h:297,s:95,l:46});
  const [cpMode, setCpMode] = useState("HSL");      // HSL | RGB | HEX
  const [cpModeOpen, setCpModeOpen] = useState(false);
  const [customColors, setCustomColors] = useState([]); // custom colors added via the palette
  const startRename = () => { if(tagMenu){ setTagEdit({gid:tagMenu.gid, name:tagMenu.name, value:tagMenu.name, isNew:false}); setTagMenu(null); } };
  const startSetColor = () => { if(tagMenu){ setColorPicker({gid:tagMenu.gid, name:tagMenu.name, x:tagMenu.x, y:tagMenu.y, mode:"swatches"}); setTagMenu(null); } };
  const applyTagColor = (patch) => setTagGroups(gs=>gs.map(g=> g.id===colorPicker.gid ? {...g, tags:g.tags.map(t=>t.name===colorPicker.name?{...t,...patch}:t)} : g));
  const pickSwatch = (c) => { applyTagColor({bg:c.bg, color:c.color}); setColorPicker(null); };
  const clearColor = () => { applyTagColor({bg:"var(--bg-secondary)", color:"var(--text-secondary)"}); setColorPicker(null); };
  const applyPalette = () => {
    const color=`hsl(${hsl.h},${hsl.s}%,${hsl.l}%)`, bg=`hsl(${hsl.h},${Math.min(hsl.s,100)}%,95%)`;
    const key=`custom-${hsl.h}-${hsl.s}-${hsl.l}`;
    setCustomColors(cs=> cs.some(c=>c.key===key) ? cs : [...cs, {key, swatch:color, bg, color}]); // add to presets
    applyTagColor({ bg, color });
    setColorPicker(null);
  };
  const cpTag = colorPicker ? (tagGroups.find(g=>g.id===colorPicker.gid)||{tags:[]}).tags.find(t=>t.name===colorPicker.name) : null;
  const startAddTag = () => { setTagEdit({gid:tagGroups[0].id, name:null, value:"", isNew:true}); };
  const saveTagEdit = () => {
    const v = (tagEdit.value||"").trim();
    if(v){
      setTagGroups(gs=>gs.map(g=>{
        if(g.id!==tagEdit.gid) return g;
        if(tagEdit.isNew) return {...g, tags:[{name:v,bg:"var(--bg-secondary)",color:"var(--text-secondary)",count:0}, ...g.tags]};
        return {...g, tags:g.tags.map(t=>t.name===tagEdit.name?{...t,name:v}:t)};
      }));
    }
    setTagEdit(null);
  };
  const convertToWs = () => {
    if(!tagMenu) return;
    setTagGroups(gs=>gs.map(g=> g.id===tagMenu.gid ? {...g, tags:g.tags.map(t=> t.name===tagMenu.name ? {...t, ws:true} : t)} : g));
    setTagMenu(null);
  };
  const openSMenu = (type, e) => { e.stopPropagation(); const r=e.currentTarget.getBoundingClientRect(); setSMenu(prev=> prev&&prev.type===type ? null : {type, x:r.right, y:r.bottom+4}); };
  const newGroup = () => { const id="grp"+(grpSeq.current++); setTagGroups(gs=>[{id, label:"New group", tags:[]}, ...gs]); setSMenu(null); };
  const collapseAll = () => { const c={}; tagGroups.forEach(g=>{ c[g.id]=true; c["ws:"+g.id]=true; c["board:"+g.id]=true; }); c["sec:ws"]=true; c["sec:board"]=true; setCollapsed(c); setSMenu(null); };
  const expandAll = () => { setCollapsed({}); setSMenu(null); };
  const renderTagGroup = (group, tags, ckey, allowEmpty) => {
    if(tags.length===0 && !allowEmpty) return null;
    const isOpen = !collapsed[ckey];
    return (
      <div key={ckey} className="ip-tag-group">
        <div className="ip-group-label" onClick={()=>toggleSection(ckey)}>
          <div className="ip-group-label-inner">
            <div className="ip-group-label-left">
              <span className="ip-group-label-text">{group.label}</span>
              <i className={"ri-arrow-down-s-line ip-group-chevron"+(collapsed[ckey]?" collapsed":"")}/>
            </div>
            <div className="ip-group-actions">
              <button className="ip-group-act-btn" onClick={e=>e.stopPropagation()}><i className="ri-more-line" style={{fontSize:16}}/></button>
              <button className="ip-group-act-btn" onClick={e=>e.stopPropagation()}><i className="ri-add-line" style={{fontSize:16}}/></button>
            </div>
          </div>
        </div>
        {isOpen && <div className="ip-tag-options">{tags.map((t,ti)=>{
          const tagKey=group.id+':'+t.name;
          const isSel=selectedTags.includes(tagKey);
          const isEditing=tagEdit && !tagEdit.isNew && tagEdit.gid===group.id && tagEdit.name===t.name;
          return (
          <div key={ti} className="ip-tag-row" onClick={()=>{ if(!isEditing) toggleTag(tagKey); }}>
            {isEditing ? (
              <div className="ip-tag-rename">
                <input className="ip-rename-input" autoFocus value={tagEdit.value}
                  onChange={e=>setTagEdit(te=>({...te,value:e.target.value}))}
                  onFocus={e=>e.target.select()}
                  onClick={e=>e.stopPropagation()}
                  onKeyDown={e=>{ if(e.key==="Enter") saveTagEdit(); if(e.key==="Escape") setTagEdit(null); }}
                  onBlur={()=>setTagEdit(null)}/>
                <button className="ip-rename-save" onMouseDown={e=>e.preventDefault()} onClick={e=>{e.stopPropagation(); saveTagEdit();}}>Save</button>
              </div>
            ) : (
            <div className={"ip-tag-row-inner"+(isSel?" selected":"")+(tagMenu&&tagMenu.key===tagKey?" menu-open":"")}>
              <span className="ip-badge" style={{background:t.bg}}>
                <span className="ip-badge-dot" style={{color:t.color}}/>
                <span className="ip-badge-label" style={{color:t.color}}>{t.name}</span>
              </span>
              <div className="ip-tag-right">
                {isSel && <span className="ip-tag-filtered" onClick={e=>{e.stopPropagation(); toggleTag(tagKey);}}><i className="ri-filter-3-line"/>Filtered</span>}
                <button className="ip-tag-act-btn more" onClick={e=>openTagMenu(group.id, t.name, e)}><i className="ri-more-line"/></button>
                <span className="ip-tag-count">{t.count}</span>
              </div>
            </div>
            )}
          </div>
          );
        })}</div>}
      </div>
    );
  };
  useEffect(()=>{
    if(!tagMenu) return;
    const close = () => setTagMenu(null);
    document.addEventListener("click", close);
    return () => document.removeEventListener("click", close);
  },[tagMenu]);
  useEffect(()=>{
    if(!sMenu) return;
    const close = () => setSMenu(null);
    document.addEventListener("click", close);
    return () => document.removeEventListener("click", close);
  },[sMenu]);
  useEffect(()=>{
    if(!colorPicker) return;
    const close = () => setColorPicker(null);
    document.addEventListener("click", close);
    return () => document.removeEventListener("click", close);
  },[colorPicker]);
  return (

const DueDateTag = React.forwardRef(function DueDateTag({ due, disabled, onOpenChange }, fwdRef){
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState({top:0,left:0});
  const tagRef = useRef(null);
  const calRef = useRef(null);
  const setRef = el => {
    tagRef.current = el;
    if (typeof fwdRef === 'function') fwdRef(el);
    else if (fwdRef) fwdRef.current = el;
  };
  const toggle = e => {
    e.stopPropagation();
    const next = !open;
    if (next && tagRef.current){
      const r = tagRef.current.getBoundingClientRect();
      setPos({top: r.bottom + 4 + window.scrollY, left: r.left + window.scrollX});
    }
    setOpen(next);
    onOpenChange && onOpenChange(next);
  };
  const close = () => { setOpen(false); onOpenChange && onOpenChange(false); };
  useEffect(()=>{
    if (!open) return;
    const handler = e => {
      if (tagRef.current && tagRef.current.contains(e.target)) return;
      if (calRef.current && calRef.current.contains(e.target)) return;
      close();
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);
  return (
    <>
      <span ref={setRef}
        className={"bl-tag bl-due-tag"+(open?" focused":"")+(disabled?" disabled":"")}
        onClick={disabled ? undefined : toggle}>
        <i className="ri-calendar-line"></i>{due}
      </span>
      {open && ReactDOM.createPortal(
        <div ref={calRef} style={{position:'absolute',top:pos.top,left:pos.left,zIndex:1000}}>
          <MiniCalendar onClose={close}/>
        </div>,
        document.body
      )}
    </>
  );
});

    if(!open && btnRef.current){
      const r = btnRef.current.getBoundingClientRect();
      setPos({top:r.bottom+4, left:r.left, width:r.width});
    }
    setOpen(o=>!o);
  };
  useEffect(()=>{
    if(!open) return;
    const h = e => {
      if(btnRef.current && btnRef.current.contains(e.target)) return;
      if(menuRef.current && menuRef.current.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener('mousedown', h);

function WorkspaceBacklog({ savedViews, onSaveView, sidebarCollapsed, onOpenSidebar }){
  const tableWrapRef = useRef(null);
  const [blScroll, setBlScroll] = useState({hasLeft:false, hasRight:false});
  const [thumb, setThumb] = useState({left:6, width:0});
  const updateThumb = () => {
    const el = tableWrapRef.current;
    if (!el) return;
    const avail = el.clientWidth - 12;
    const ratio = el.clientWidth / el.scrollWidth;
    const w = Math.max(40, ratio * avail);
    const maxScroll = el.scrollWidth - el.clientWidth;
    const l = maxScroll > 0 ? 6 + (el.scrollLeft / maxScroll) * (avail - w) : 6;
    setThumb({width: w, left: l});
    setBlScroll({hasLeft: el.scrollLeft > 0, hasRight: el.scrollLeft < maxScroll - 1});
  };
  const handleThumbDown = e => {
    e.preventDefault();
    const el = tableWrapRef.current;
    if (!el) return;
    const startX = e.clientX, startScroll = el.scrollLeft;
    const avail = el.clientWidth - 12;
    const w = Math.max(40, (el.clientWidth / el.scrollWidth) * avail);
    const maxScroll = el.scrollWidth - el.clientWidth;
    const onMove = ev => { el.scrollLeft = startScroll + (ev.clientX - startX) * (maxScroll / (avail - w)); };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
  useEffect(()=>{
    const el = tableWrapRef.current;
    if (!el) return;
    updateThumb();
    el.addEventListener('scroll', updateThumb, {passive:true});
    window.addEventListener('resize', updateThumb);
    return ()=>{ el.removeEventListener('scroll', updateThumb); window.removeEventListener('resize', updateThumb); };
  }, []);

  const filterBtnRef = useRef(null);

    setBlDispOpen(o=>!o);
  };
  const toggleBlCol = key => setBlCols(c=>({...c,[key]: !c[key]}));
  const blColCount = 3 + BL_DISPLAY_COLS.filter(c=>blCols[c.key]).length; // check + ticket + act always
  // resizable column widths (min = default, max = 2×default)
  const [colW, setColW] = useState(()=>({...BL_COL_W}));
  const startColResize = (key, e)=>{
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX, startW = colW[key], def = BL_COL_W[key];
    const min = def, max = def*2;
    const onMove = ev => { const w = Math.max(min, Math.min(max, startW + (ev.clientX - startX))); setColW(cw=>({...cw,[key]:w})); };
    const onUp = ()=>{ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); document.body.style.cursor=''; };
    document.body.style.cursor='col-resize';
    document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
  };
  const blTableWidth = 88 + colW.ticket + BL_DISPLAY_COLS.reduce((s,c)=> s + (blCols[c.key]?colW[c.key]:0), 0); // 44+44 check+act
  const blFilterCount = BL_FILTER_CATS.reduce((n,c)=> n+(blFilters[c.id]?.length||0), 0);
  const toggleBlFilter = ()=>{

  const [dropTarget, setDropTarget] = useState(null); // {id,pos}
  const [abMenu, setAbMenu]       = useState(null); // {type:'more'|'status'|'member'|'due', anchor}
  const [rowMembersMenu, setRowMembersMenu] = useState(null); // {ids, anchor}
  const [rowTagsMenu, setRowTagsMenu] = useState(null); // {tags, anchor}
  const [rowMenu, setRowMenu] = useState(null); // {id, anchor} — single-row ... menu
  const [collapsed, setCollapsed] = useState(()=>new Set()); // collapsed group/subgroup ids
  const toggleCollapse = (id)=> setCollapsed(prev=>{ const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  useEffect(()=>{ setCollapsed(new Set()); }, [group.field, group.sub]); // reset on config change
  const reorderable = sort.field==="None" && group.field==="None";

  const blById = useMemo(()=>Object.fromEntries(BACKLOG.map(r=>[r.id,r])),[]);
  const closeMenus = ()=>{ setAbMenu(null); setRowMembersMenu(null); setRowTagsMenu(null); setRowMenu(null); };
  // clear selection on Escape
  useEffect(()=>{
    const h = e => { if(e.key==='Escape'){ setSelectedIds(new Set()); closeMenus(); } };
    window.addEventListener('keydown', h);
    return ()=> window.removeEventListener('keydown', h);
  }, []);

  };

  const toggleRow = (id)=>{
    setSelectedIds(prev=>{ const next=new Set(prev); next.has(id)?next.delete(id):next.add(id); return next; });
    setLastSelectedId(id);
  };
  const rangeSelect = (id, allIds)=>{
    if(!lastSelectedId || !allIds.includes(lastSelectedId)) return toggleRow(id);
    const start=allIds.indexOf(lastSelectedId), end=allIds.indexOf(id);
    const range=allIds.slice(Math.min(start,end), Math.max(start,end)+1);
    setSelectedIds(prev=>{ const next=new Set(prev); range.forEach(r=>next.add(r)); return next; });
    setLastSelectedId(id);
  };
  const bulkMark = (kind)=>{
    const upd = kind==='ready' ? {status:'queued',statusLabel:'Queued'} : {status:'blocked',statusLabel:'Blocked'};
    setOverrides(prev=>{ const next={...prev}; selectedIds.forEach(id=>{ next[id]={...(next[id]||{}),...upd}; }); return next; });
    setAbMenu(null);
  };
  const bulkSetStatus = (st)=>{
    setOverrides(prev=>{ const next={...prev}; selectedIds.forEach(id=>{ next[id]={...(next[id]||{}),status:st.s,statusLabel:st.label}; }); return next; });
    setAbMenu(null);
  };
  const bulkAddMembers = (ids)=>{
    if(!ids.length) return setAbMenu(null);
    setOverrides(prev=>{
      const next={...prev};
      selectedIds.forEach(id=>{
        const cur = (next[id]&&next[id].members) || blById[id].members || [];
        const merged = [...cur];
        ids.forEach(m=>{ if(!merged.includes(m)) merged.push(m); });
        next[id]={...(next[id]||{}), members:merged, membersMore:undefined};
      });
      return next;
    });
    setAbMenu(null);
  };
  const bulkSetDue = (range)=>{
    if(!range || !range.start) return;
    const due = fmtBlDue(range.start) + (range.end ? " – "+fmtBlDue(range.end) : "");
    setOverrides(prev=>{ const next={...prev}; selectedIds.forEach(id=>{ next[id]={...(next[id]||{}),due}; }); return next; });
  };
  const bulkMoveTo = (where)=>{
    if(where==='top' || where==='bottom'){
      setRowOrder(prev=>{
        const sel = prev.filter(id=>selectedIds.has(id));
        const rest = prev.filter(id=>!selectedIds.has(id));
        return where==='top' ? [...sel,...rest] : [...rest,...sel];
      });
    }
    // 'backlog' — already in the workspace backlog view (no-op in the prototype)
    setAbMenu(null);
  };
  const rowTagsOf = (id)=> (overrides[id] && overrides[id].tags) || (blById[id] && blById[id].tags) || [];
  const tagOnAll = (tagStr)=>{ const ids=[...selectedIds]; return ids.length>0 && ids.every(id=>rowTagsOf(id).includes(tagStr)); };
  const bulkApplyTags = (selSet)=>{
    const universe=[]; INFO_TAG_GROUPS.forEach(g=>g.tags.forEach(t=>universe.push(`${g.label}: ${t.name}`)));
    const toAdd    = universe.filter(tag=> selSet.has(tag) && !tagOnAll(tag)); // newly checked
    const toRemove = universe.filter(tag=> !selSet.has(tag) && tagOnAll(tag)); // unchecked common
    setOverrides(prev=>{
      const next={...prev};
      selectedIds.forEach(id=>{
        let tags = [...((next[id]&&next[id].tags) || blById[id].tags || [])];
        toRemove.forEach(tag=>{ tags = tags.filter(t=>t!==tag); });
        toAdd.forEach(tag=>{ if(!tags.includes(tag)) tags.push(tag); });
        next[id]={...(next[id]||{}), tags, tagsMore:undefined};
      });
      return next;
    });
    setAbMenu(null);
  };
  // single-row actions (row "..." menu)
  const rowMark = (id, kind)=>{
    const upd = kind==='ready' ? {status:'queued',statusLabel:'Queued'} : {status:'blocked',statusLabel:'Blocked'};
    setOverrides(prev=>({...prev, [id]:{...(prev[id]||{}), ...upd}}));

  const rowMoveTo = (id, where)=>{

  const rowDelete = (id)=>{

  const bulkDelete = ()=>{

  const commitReorder = ()=>{

      ? rowOrder.filter(id=>selectedIds.has(id))   // preserve order, move whole selection
      : [dragId];
    if(moving.includes(dropTarget.id)) return;      // can't drop the block onto itself
    setRowOrder(prev=>{
      const arr=prev.filter(x=>!moving.includes(x));
      let idx=arr.indexOf(dropTarget.id);
      if(idx<0) return prev;
      if(dropTarget.pos==='after') idx++;
      arr.splice(idx,0,...moving);
      return arr;
    });
  };

  const openSort = ()=>{ if(!sortOpen && sortBtnRef.current){ const r=sortBtnRef.current.getBoundingClientRect(); setSortPos({top:r.bottom+4,left:r.left}); } setGroupOpen(false); setSortOpen(o=>!o); };
  const openGroup = ()=>{ if(!groupOpen && groupBtnRef.current){ const r=groupBtnRef.current.getBoundingClientRect(); setGroupPos({top:r.bottom+4,left:r.left}); } setSortOpen(false); setGroupOpen(o=>!o); };
  const sortArrow = (f)=> sort.field===f ? <i className={"bl-sort-arrow ri-arrow-"+(sort.dir==="Descending"?"down":"up")+"-line"}></i> : null;

  const blRows = useMemo(()=>{
    const dir = sort.dir==="Descending"?-1:1;
    const gkey = (r,f)=> f==="Status" ? (BL_STATUS_RANK[r.status]??9) : f==="Due date" ? blParseDue(r.due) : blGroupKey(r,f);
    const gk = r => gkey(r, group.field);
    const sk = r => gkey(r, group.sub);
    const sortK = r => sort.field==="Due date"?blParseDue(r.due) : sort.field==="Estimated"?blParsePts(r.estimated) : sort.field==="Status"?(BL_STATUS_RANK[r.status]??9) : sort.field==="ID"?r.id : null;
    const cmp = (a,b)=>{
      if(group.field!=="None"){ const ga=gk(a),gb=gk(b); if(ga<gb)return -1; if(ga>gb)return 1; }
      if(group.field!=="None" && group.sub!=="None"){ const sa=sk(a),sb=sk(b); if(sa<sb)return -1; if(sa>sb)return 1; }
      if(sort.field!=="None"){ const av=sortK(a),bv=sortK(b); if(av<bv)return -dir; if(av>bv)return dir; }
      return 0;
    };
    let base = rowOrder
      .filter(id=>!deleted.has(id))
      .map(id=>{ const r=blById[id]; return overrides[id]?{...r,...overrides[id]}:r; })
      .filter(Boolean);
    if(blFilters.member.length)
      base = base.filter(r=> (r.members||[]).some(m=>blFilters.member.includes(m)));
    return base.sort(cmp);
  },[sort,group,blFilters.member,rowOrder,deleted,overrides,blById]);

  const blDisplay = useMemo(()=>{
    if(group.field==="None") return blRows.map(row=>({type:"row",row,depth:0}));
    const primOrder=[], prim=new Map();
    blRows.forEach(r=>{ const k=blGroupKey(r,group.field); if(!prim.has(k)){ prim.set(k,[]); primOrder.push(k); } prim.get(k).push(r); });
    const out=[];
    primOrder.forEach(pk=>{
      const pRows=prim.get(pk), pid="group:"+pk;
      out.push({type:"group", id:pid, label:pk, count:pRows.length, depth:0, field:group.field, sample:pRows[0]});
      if(collapsed.has(pid)) return;
      if(group.sub!=="None"){
        const subOrder=[], sub=new Map();
        pRows.forEach(r=>{ const sk2=blGroupKey(r,group.sub); if(!sub.has(sk2)){ sub.set(sk2,[]); subOrder.push(sk2); } sub.get(sk2).push(r); });
        subOrder.forEach(sk2=>{
          const sRows=sub.get(sk2), sid="sub:"+pk+":"+sk2;
          out.push({type:"group", id:sid, label:sk2, count:sRows.length, depth:1, field:group.sub, sample:sRows[0]});
          if(collapsed.has(sid)) return;
          sRows.forEach(row=>out.push({type:"row",row,depth:2}));
        });
      } else {
        pRows.forEach(row=>out.push({type:"row",row,depth:1}));
      }
    });
    return out;
  },[blRows,group.field,group.sub,collapsed]);

  const displayedIds = blDisplay.filter(x=>x.type==="row").map(x=>x.row.id);
  const someSelected = displayedIds.some(id=>selectedIds.has(id));
  const allSelected  = displayedIds.length>0 && displayedIds.every(id=>selectedIds.has(id));
  const selectionActive = selectedIds.size>0;
  const toggleAll = ()=> setSelectedIds(allSelected ? new Set() : new Set(displayedIds));
  const onCheckClick = (id, e)=>{ e.stopPropagation(); if(e.shiftKey) rangeSelect(id, displayedIds); else toggleRow(id); };
  const rowMembers = (row)=> (overrides[row.id] && overrides[row.id].members) || row.members || [];

  return (
    <div className="backlog-page">
      <div className="bl-hdr">
        <div className="bl-hdr-left">
          {sidebarCollapsed &&
            <button className="icon-btn" onClick={onOpenSidebar} title="Open sidebar"><i className="ri-menu-line"></i></button>}
          <div className="bl-hdr-title">
            <i className="ri-inbox-line"></i>
            <span>Workspace backlog</span>
          </div>
        </div>
        <div className="bl-hdr-right">
          <button className="icon-btn" title="Search"><i className="ri-search-line"></i></button>
          <button className="icon-btn" title="Notifications"><i className="ri-notification-3-line"></i></button>
        </div>
      </div>
      <div className="bl-toolbar">
        <div className="tb-group">
          <div className="filter-wrap">
            <button ref={filterBtnRef} className={"tb-btn"+(blFilterOpen?" active":"")} onClick={toggleBlFilter}>
              <i className="ri-filter-3-line"></i><span className="btn-label">Filter</span>
              {blFilterCount>0 && <span className="tb-badge">{blFilterCount}</span>}
            </button>
            {blFilterOpen && <FilterMenu filters={blFilters} setFilters={setBlFilters}
              cat={blFilterCat} setCat={setBlFilterCat}
              onClose={()=>setBlFilterOpen(false)} cats={BL_FILTER_CATS}
              onSave={()=>{ setBlFilterOpen(false); onSaveView&&onSaveView(); }}
              style={{position:"fixed",top:blFilterPos.top,left:blFilterPos.left}}/>}
          </div>
          <div className="filter-wrap">
            <button ref={sortBtnRef} className="tb-btn" onClick={openSort}>
              <i className="ri-arrow-up-down-line"></i><span className="btn-label">{sort.field==="None"?"Sort":"Sort: "+sort.field}</span>
            </button>
            {sortOpen && <SortMenu pos={sortPos} sort={sort} setSort={setSort} onClose={()=>setSortOpen(false)}/>}
          </div>
          <div className="filter-wrap">
            <button ref={groupBtnRef} className="tb-btn" onClick={openGroup}>
              <i className="ri-layout-grid-line"></i><span className="btn-label">{group.field==="None"?"Group":"Group: "+group.field}</span>
            </button>
            {groupOpen && <GroupMenu pos={groupPos} group={group} setGroup={setGroup} onClose={()=>setGroupOpen(false)}/>}
          </div>
        </div>
        <div className="bl-toolbar-right">
          <AvatarGroup filters={blFilters} setFilters={setBlFilters}/>
          <div className="filter-wrap">
            <div ref={blDispBtnRef} className={"bl-sort-btn"+(blDispOpen?" active":"")} onClick={openBlDisp}>
              <i className="ri-equalizer-line"></i>
              <i className="ri-arrow-down-s-line" style={{transition:"transform .15s ease", transform: blDispOpen?"rotate(180deg)":"none"}}></i>
            </div>
            {blDispOpen && <>
              <div className="fm-overlay" onClick={()=>setBlDispOpen(false)}/>
              <div className="disp-menu" style={{position:"fixed",top:blDispPos.top,left:blDispPos.left}} onClick={e=>e.stopPropagation()}>
                {BL_DISPLAY_COLS.map(c=>(
                  <button key={c.key} className="disp-opt" onClick={()=>toggleBlCol(c.key)}>
                    <span className="disp-label">{c.label}</span>
                    <span className={"sg-toggle"+(blCols[c.key]?" on":"")}><span className="knob"></span></span>
                  </button>
                ))}
              </div>
            </>}
          </div>
          <button className={"icon-btn"+(blInfoOpen?" active":"")} title="Info" onClick={()=>setBlInfoOpen(o=>!o)}
            style={blInfoOpen?{border:"1px solid var(--border-brand)",boxShadow:"0 0 0 2px var(--focus-ring)"}:{border:"1px solid var(--border-secondary)",boxShadow:"var(--shadow-xs)"}}>
            <i className="ri-information-line"></i></button>
        </div>
      </div>
      <div className="bl-body">
        <div className={"bl-table-wrap"+(blScroll.hasRight?" bl-has-right":"")+(blScroll.hasLeft?" bl-has-left":"")} ref={tableWrapRef}>
        <table className={"bl-table"+(reorderable?" bl-reorderable":"")+(blCols.id?"":" bl-noid")} style={{width:blTableWidth}}>
          <colgroup>
            <col className="bl-col-check"/>
            {blCols.id && <col style={{width:colW.id}}/>}
            <col style={{width:colW.ticket}}/>
            {blCols.project && <col style={{width:colW.project}}/>}
            {blCols.status && <col style={{width:colW.status}}/>}
            {blCols.due && <col style={{width:colW.due}}/>}
            {blCols.members && <col style={{width:colW.members}}/>}
            {blCols.est && <col style={{width:colW.est}}/>}
            {blCols.tasks && <col style={{width:colW.tasks}}/>}
            {blCols.attach && <col style={{width:colW.attach}}/>}
            {blCols.comments && <col style={{width:colW.comments}}/>}
            {blCols.logged && <col style={{width:colW.logged}}/>}
            {blCols.tags && <col style={{width:colW.tags}}/>}
            <col className="bl-col-act"/>
          </colgroup>
          <thead>
            <tr>
              <th className="bl-sticky-check"><BlCheckbox checked={allSelected} indeterminate={someSelected && !allSelected} onClick={toggleAll}/></th>
              {blCols.id && <th className="bl-sticky-id">ID{sortArrow("ID")}</th>}
              <th className="bl-sticky-ticket">Ticket</th>
              {blCols.project && <th className="bl-th-resizable">Project<span className="bl-col-resize" onMouseDown={e=>startColResize("project",e)}/></th>}
              {blCols.status && <th className="bl-th-resizable">Status{sortArrow("Status")}<span className="bl-col-resize" onMouseDown={e=>startColResize("status",e)}/></th>}
              {blCols.due && <th className="bl-th-resizable">Due date{sortArrow("Due date")}<span className="bl-col-resize" onMouseDown={e=>startColResize("due",e)}/></th>}
              {blCols.members && <th className="bl-th-resizable">Members<span className="bl-col-resize" onMouseDown={e=>startColResize("members",e)}/></th>}
              {blCols.est && <th className="bl-th-resizable">Estimated{sortArrow("Estimated")}<span className="bl-col-resize" onMouseDown={e=>startColResize("est",e)}/></th>}
              {blCols.tasks && <th className="bl-th-resizable">Tasks<span className="bl-col-resize" onMouseDown={e=>startColResize("tasks",e)}/></th>}
              {blCols.attach && <th className="bl-th-resizable">Attachments<span className="bl-col-resize" onMouseDown={e=>startColResize("attach",e)}/></th>}
              {blCols.comments && <th className="bl-th-resizable">Comments<span className="bl-col-resize" onMouseDown={e=>startColResize("comments",e)}/></th>}
              {blCols.logged && <th className="bl-th-resizable">Logged work<span className="bl-col-resize" onMouseDown={e=>startColResize("logged",e)}/></th>}
              {blCols.tags && <th className="bl-th-resizable">Tags<span className="bl-col-resize" onMouseDown={e=>startColResize("tags",e)}/></th>}
              <th className="bl-sticky-act"></th>
            </tr>
          </thead>
          <tbody>
            {blDisplay.map((item,i)=>{
              if(item.type==="group"){
                const isCol = collapsed.has(item.id);
                const memId = item.field==="Member" && item.sample.members && item.sample.members[0];
                return (
                  <tr key={item.id} className={"bl-group-row"+(item.depth===0?" primary":" sub")}>
                    <td colSpan={blColCount} className="bl-group-cell" onClick={()=>toggleCollapse(item.id)}>
                      <div className="bl-group-inner" style={{paddingLeft:12+item.depth*20}}>
                        <i className={"ri-arrow-down-s-line bl-group-chev"+(isCol?" collapsed":"")}></i>
                        {item.field==="Status"
                          ? <BlStatus s={item.sample.status} label={item.label}/>
                          : item.field==="Member"
                            ? <span className="bl-group-name bl-group-member">
                                {memId && <BlAv id={memId}/>}
                                <span>{item.label}</span>
                              </span>
                            : <span className="bl-group-name">{item.label}</span>}
                        <span className="bl-group-count">{item.count}</span>
                      </div>
                    </td>
                  </tr>
                );
              }
              const row=item.row;
              const isSel = selectedIds.has(row.id);
              const isDropT = dropTarget && dropTarget.id===row.id && dragId!=null && dragId!==row.id;
              const trCls = (isSel?"selected":"") + (dragId===row.id?" bl-dragging":"");
              const dropInd = <tr className="bl-drop-row"><td colSpan={blColCount}><div className="sb-drag-indicator"><span className="sb-drag-dot"></span><span className="sb-drag-line"></span></div></td></tr>;
              return (
              <React.Fragment key={i}>
              {isDropT && dropTarget.pos==="before" && dropInd}
              <tr className={trCls.trim()}
                draggable={reorderable}
                onDragStart={e=>{ if(!reorderable){ e.preventDefault(); return; } setDragId(row.id); e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",row.id);}catch(_){} }}
                onDragOver={e=>{ if(!reorderable || dragId==null || dragId===row.id) return; e.preventDefault(); const r=e.currentTarget.getBoundingClientRect(); const pos=(e.clientY-r.top)<r.height/2?"before":"after"; setDropTarget(prev=> (prev&&prev.id===row.id&&prev.pos===pos)?prev:{id:row.id,pos}); }}
                onDrop={e=>{ e.preventDefault(); commitReorder(); }}
                onDragEnd={()=>{ setDragId(null); setDropTarget(null); }}>
                <td className="bl-sticky-check"><BlCheckbox checked={isSel} onClick={e=>onCheckClick(row.id,e)}/></td>
                {blCols.id && <td className="bl-sticky-id" style={{color:"var(--text-quaternary)"}}>
                  <div className="bl-id-cell"><span>{row.id}</span></div>
                </td>}
                <td className="bl-sticky-ticket" style={{overflow:"hidden"}}>
                  <div className="bl-ticket-cell">
                    <span className="bl-ticket-text">{row.ticket}</span>
                    {row.desc && <i className="ri-align-left bl-dash" style={{fontSize:14,flexShrink:0}}></i>}
                  </div>
                </td>
                {blCols.project && <td>{row.project}</td>}
                {blCols.status && <td><BlStatus s={row.status} label={row.statusLabel}/></td>}
                {blCols.due && <td>
                  {row.due
                    ? <DueDateTag due={row.due}/>
                    : <span className="bl-dash">—</span>}
                </td>}
                {blCols.members && <td>
                  <div className="bl-avs">
                    {row.members.map(id=><BlAv key={id} id={id}/>)}
                    {row.membersMore && <div className="bl-av neutral"
                      onClick={e=>{ e.stopPropagation(); setRowMembersMenu({ids:row.members, anchor:e.currentTarget.getBoundingClientRect()}); }}>{row.membersMore}</div>}
                  </div>
                </td>}
                {blCols.est && <td>
                  {row.estimated
                    ? <span className="bl-tag"><i className="ri-bar-chart-line"></i>{row.estimated}</span>
                    : <span className="bl-dash">—</span>}
                </td>}
                {blCols.tasks && <td><BlMeta icon="ri-checkbox-circle-line" val={row.tasks}/></td>}
                {blCols.attach && <td><BlMeta icon="ri-attachment-2" val={row.attachments||null}/></td>}
                {blCols.comments && <td><BlMeta icon="ri-discuss-line" val={row.comments||null}/></td>}
                {blCols.logged && <td>
                  {row.logged
                    ? <span className="bl-tag"><i className="ri-timer-line"></i>{row.logged}</span>
                    : <span className="bl-dash">—</span>}
                </td>}
                {blCols.tags && <td>
                  <div className="bl-tags-cell">
                    {row.tags.map((t,ti)=>{
                      const cls = "bl-tbadge "+blTagColor(t);
                      return (
                        <span key={ti} className={cls}>
                          <span className="bl-tbadge-dot"></span>{t}
                        </span>
                      );
                    })}
                    {row.tagsMore && <span className="bl-tbadge more" style={{cursor:"pointer"}}
                      onClick={e=>{ e.stopPropagation(); setRowTagsMenu({tags:row.tags, anchor:e.currentTarget.getBoundingClientRect()}); }}>{row.tagsMore}</span>}
                  </div>
                </td>}
                <td className="bl-sticky-act">
                  <div className={"bl-more-btn"+(rowMenu&&rowMenu.id===row.id?" active":"")}
                    onClick={e=>{ e.stopPropagation(); setRowMenu({id:row.id, anchor:e.currentTarget.getBoundingClientRect()}); }}>
                    <i className="ri-more-line" style={{fontSize:16}}></i></div>
                </td>
              </tr>
              {isDropT && dropTarget.pos==="after" && dropInd}
              </React.Fragment>
              );
            })}
          </tbody>
        </table>
        </div>
        <div className="bl-scrollbar-track">
          <div className="bl-scrollbar-thumb" style={{width:thumb.width,left:thumb.left}} onMouseDown={handleThumbDown}/>
        </div>
      </div>
      {selectionActive &&
        <div className="bl-action-bar" onMouseDown={e=>e.stopPropagation()}>
          <div className="bl-ab-item bl-ab-count">{selectedIds.size} selected</div>
          <div className={"bl-ab-item"+(abMenu&&abMenu.type==="due"?" open":"")} onClick={e=>openAbMenu("due",e)}><i className="ri-calendar-line"></i>Due date</div>
          <div className={"bl-ab-item"+(abMenu&&abMenu.type==="status"?" open":"")} onClick={e=>openAbMenu("status",e)}><i className="ri-checkbox-blank-circle-line"></i>Status</div>
          <div className={"bl-ab-item"+(abMenu&&abMenu.type==="tag"?" open":"")} onClick={e=>openAbMenu("tag",e)}><i className="ri-price-tag-3-line"></i>Tag</div>
          <div className={"bl-ab-item"+(abMenu&&abMenu.type==="member"?" open":"")} onClick={e=>openAbMenu("member",e)}><i className="ri-user-3-line"></i>Member</div>
          <div className={"bl-ab-item bl-ab-more"+(abMenu&&abMenu.type==="more"?" open":"")} onClick={e=>openAbMenu("more",e)}>
            <i className="ri-more-line"></i>
          </div>
        </div>}
      {abMenu && abMenu.type==="more" &&
        <BlSelectionMenu anchor={abMenu.anchor} onClose={()=>setAbMenu(null)}
          onMark={bulkMark} onMove={bulkMoveTo} onDelete={bulkDelete}/>}
      {abMenu && abMenu.type==="status" &&
        <BlStatusMenu anchor={abMenu.anchor} onClose={()=>setAbMenu(null)} onApply={bulkSetStatus}/>}
      {abMenu && abMenu.type==="member" &&
        <BlMemberMenu anchor={abMenu.anchor} onClose={()=>setAbMenu(null)} onApply={bulkAddMembers}/>}
      {abMenu && abMenu.type==="tag" &&
        <BlTagMenu anchor={abMenu.anchor} onClose={()=>setAbMenu(null)} isOn={tagOnAll} onApply={bulkApplyTags}/>}
      {abMenu && abMenu.type==="due" && ReactDOM.createPortal(
        <>
          <div className="fm-overlay" onClick={()=>setAbMenu(null)}></div>
          <div style={aboveAnchor(abMenu.anchor,284)}>
            <MiniCalendar onChange={bulkSetDue} onClose={()=>setAbMenu(null)}/>
          </div>
        </>,
        document.body
      )}
      {rowMembersMenu &&
        <BlRowMembersMenu anchor={rowMembersMenu.anchor} ids={rowMembersMenu.ids} onClose={()=>setRowMembersMenu(null)}/>}
      {rowTagsMenu &&
        <BlRowTagsMenu anchor={rowTagsMenu.anchor} tags={rowTagsMenu.tags} onClose={()=>setRowTagsMenu(null)}/>}
      {rowMenu &&
        <BlRowMenu anchor={rowMenu.anchor} onClose={()=>setRowMenu(null)}
          onMark={(k)=>rowMark(rowMenu.id,k)} onMove={(w)=>rowMoveTo(rowMenu.id,w)} onDelete={()=>rowDelete(rowMenu.id)}/>}
      <InfoPanel open={blInfoOpen} onClose={()=>setBlInfoOpen(false)} activityDisabled className="in-backlog"/>
    </div>
  );
}

/* ============================ App ============================ */
function App(){
  const [dark,setDark] = useState(false);
  const [collapsed,setCollapsed] = useState(false);
  const [activeBoard,setActiveBoard] = useState("design");
  const [savedViews,setSavedViews]     = useState([]);
  const [saveViewOpen,setSaveViewOpen] = useState(false);
  const openSaveView = ()=>setSaveViewOpen(true);
  const confirmSaveView = name=>{ setSavedViews(v=>[...v,{id:String(v.length+1),name}]); setSaveViewOpen(false); };
  const [activeTab,setActiveTab] = useState("Board");
  const [filterOpen,setFilterOpen] = useState(false);
  const [filterCat,setFilterCat] = useState("member");
  const [filters,setFilters] = useState({member:[],tag:[],date:[],dateRange:null});
  const [data,setData] = useState(SEED);
  const [openCard,setOpenCard] = useState(null);
  const [infoOpen,setInfoOpen] = useState(false);
  const [display,setDisplay] = useState({members:true,id:true,due:true,tasks:true,attach:true,logged:true,comments:true,tags:true,fulltags:true,assignees:true,estimate:true});

  useEffect(()=>{
    document.documentElement.setAttribute("data-theme", dark?"dark":"light");
  },[dark]);

  const [boardNames,setBoardNames] = useState(()=>{ const o={}; BOARDS.forEach(b=>o[b.id]=b.name); return o; });
  const boardName = boardNames[activeBoard] || "Design";
  const boardsList = BOARDS.map(b=>({...b, name:boardNames[b.id]||b.name}));

  const filterCount = filters.member.length + filters.tag.length +
    filters.date.filter(d=>d!=='custom').length + (filters.dateRange?.start?1:0);
  const matchesFilter = (card)=>{
    if(filters.member.length && !card.assignees.some(a=>filters.member.includes(a))) return false;
    if(filters.tag.length && !card.tags.some(t=>filters.tag.includes(t))) return false;
    return true; // date filters are visual-only in this prototype
  };

  const counts = useMemo(()=>{
    const all = Object.values(data).flat().filter(matchesFilter);
    return { cards:all.length, points:all.reduce((a,c)=>a+c.points,0) };
  },[data,filters]);

  // Only the "Design" board has seed content; others render empty board.
  const boardData = activeBoard==="design" ? data : {todo:[],prog:[],review:[],done:[]};

  return (
    <DisplayCtx.Provider value={display}>
    <div className="app">
      <Sidebar collapsed={collapsed} activeBoard={activeBoard}
        onSelectBoard={(id)=>{ setActiveBoard(id); setActiveTab("Board"); }}
        dark={dark} onToggleDark={()=>setDark(d=>!d)}
        onClose={()=>setCollapsed(true)}
        savedViews={savedViews}/>
      <div className="main">
        {activeBoard==="backlog" ? <WorkspaceBacklog savedViews={savedViews} onSaveView={openSaveView} sidebarCollapsed={collapsed} onOpenSidebar={()=>setCollapsed(false)}/> : <>
          <Header sidebarCollapsed={collapsed} onOpenSidebar={()=>setCollapsed(false)}
            boardName={boardName} activeTab={activeTab} onTab={setActiveTab}
            boards={boardsList} projects={PROJECTS} activeBoard={activeBoard}
            onSelectBoard={(id)=>{ setActiveBoard(id); setActiveTab("Board"); }}
            onRenameBoard={(id,name)=>setBoardNames(n=>({...n,[id]:name}))}/>
          {activeTab==="Board" && <Toolbar filterOpen={filterOpen} setFilterOpen={setFilterOpen}
            filters={filters} setFilters={setFilters} filterCat={filterCat} setFilterCat={setFilterCat} filterCount={filterCount}
            onSaveView={openSaveView} infoOpen={infoOpen} onToggleInfo={()=>setInfoOpen(o=>!o)}
            display={display} setDisplay={setDisplay}/>}

          <div className="board-area">
            {activeTab==="Board" && (
              activeBoard==="design"
                ? <BoardView data={data} setData={setData} onOpenCard={setOpenCard} filterFn={matchesFilter}/>
                : <div className="board-wrap"><div className="empty">
                    <i className="ri-layout-column-line"></i>
                    <div style={{fontWeight:600,color:"var(--text-secondary)"}}>{boardName} board</div>
                    <div>No cards yet — this is a prototype with sample data on the Design board.</div>
                  </div></div>
            )}
            {activeTab==="Calendar" && <CalendarView data={boardData}/>}
            {activeTab==="Board reports" && <ReportsView data={boardData}/>}
            {activeTab==="Delivered from board" && <DeliveredView data={boardData} onOpenCard={setOpenCard}/>}
            <InfoPanel open={infoOpen} onClose={()=>setInfoOpen(false)}/>
          </div>
          {activeTab==="Board" &&
            <div className="footer">
              <span className="summary">{counts.cards} cards, {counts.points} points</span>
              <button className="icon-btn" title="Delivered from board" onClick={()=>setActiveTab("Delivered from board")}><i className="ri-truck-line"></i></button>
            </div>}
        </>}
      </div>
      <CardModal card={openCard} onClose={()=>setOpenCard(null)}/>
      {saveViewOpen && <SaveViewModal
        onCancel={()=>setSaveViewOpen(false)}
        onConfirm={confirmSaveView}/>}
    </div>
    </DisplayCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
