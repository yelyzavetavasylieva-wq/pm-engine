<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PM Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ============ Design tokens — "Blank" design system ============ */
:root{
  /* ─── Backgrounds ─── */
  --bg-primary:#ffffff;
  --bg-secondary:#eaedf0;
  --bg-secondary-subtle:#f6f8fa;
  --bg-active:#eaedf0;
  --bg-hover:#eaedf0;
  --bg-disabled-subtle:#f6f8fa;
  --bg-brand-solid:#008ee5;
  --bg-brand-solid-hover:#0077c0;
  --bg-brand-primary:#f0f7fd;
  --bg-brand-secondary:#d6ebfa;
  --bg-success-primary:#eff8ec;
  --bg-success-solid:#208d53;
  --bg-error-primary:#ffebe9;
  --bg-warning-primary:#fff8f0;
  --bg-purple-primary:#eee0f0;
  --bg-surface-default:#ffffff;
  --bg-input-normal:#ffffff;
  --bg-overlay:rgba(255,255,255,0);

  /* ─── Text ─── */
  --text-primary:#24292f;
  --text-base-primary:#14151a;
  --text-secondary:#4f5861;
  --text-tertiary:#656d76;
  --text-quaternary:#7d8590;
  --text-quinary:#a2a9b1;
  --text-disabled:#a2a9b1;
  --text-placeholder:#7d8590;
  --text-brand:#008ee5;
  --text-success:#208d53;
  --text-error:#b11d27;
  --text-warning:#c86a04;
  --text-purple:#4a0d8a;
  --text-on-brand:#ffffff;

  /* ─── Borders ─── */
  --border-primary:#c1c7cd;
  --border-secondary:#d8dee4;
  --border-surface:#ffffff;
  --border-brand:#85c2f0;
  --border-action-normal:#dee0e3;
  --border-disabled:#d8dee4;

  /* ─── Foreground / Icons ─── */
  --fg-brand:#008ee5;
  --fg-success:#208d53;
  --fg-warning:#c86a04;
  --fg-purple:#4a0d8a;
  --fg-tertiary:#656d76;
  --fg-quaternary:#7d8590;
  --fg-quinary:#a2a9b1;
  --fg-error:#b11d27;

  /* ─── Legacy aliases (app-specific token names) ─── */
  --bg-primary-hover:#eaedf0;
  --bg-tertiary:#d8dee4;
  --bg-canvas:#f6f8fa;
  --brand-text:#008ee5;   --brand-bg:#f0f7fd;
  --success-text:#208d53; --success-bg:#eff8ec;
  --warning-text:#c86a04; --warning-bg:#fff8f0;
  --error-text:#b11d27;   --error-bg:#ffebe9;
  --purple-text:#4a0d8a;  --purple-bg:#eee0f0;

  /* ─── Radii & shadows ─── */
  --radius-xs:4px; --radius-sm:6px; --radius-md:8px; --radius-lg:10px; --radius-xl:12px; --radius-full:999px;
  --shadow-xs:0px 1px 2px 0px rgba(16,24,40,.05);
  --shadow-md:0px 4px 16px 0px rgba(16,24,40,.10);
  --shadow-lg:0px 10px 16px -3px rgba(20,21,26,.08),0px 3px 6px -2px rgba(20,21,26,.05);
  --shadow-modal:0px 12px 16px 0px rgba(16,24,40,.08),0px 4px 6px 0px rgba(16,24,40,.03);
  --shadow-input:0px 1px 1px rgba(20,21,26,.05);

  /* ─── Focus ring & scrim ─── */
  --focus-ring:rgba(51,136,255,.32);
  --bg-scrim:rgba(16,24,40,.45);
}
[data-theme="dark"]{
  /* Dark values read from Figma node 6820-75408 (real designer tokens).
     Unexposed tokens are derived from light-mode equalities and marked (derived). */
  /* ─── Backgrounds ─── */
  --bg-primary:#000000;
  --bg-secondary:#24292f;
  --bg-secondary-subtle:#0d1117;      /* derived */
  --bg-active:#24292f;                /* = bg-secondary (light equality) */
  --bg-hover:#24292f;                 /* = bg-secondary (light equality) */
  --bg-disabled-subtle:#0d1117;       /* derived */
  --bg-brand-solid:#008ee5;
  --bg-brand-solid-hover:#33a3ea;
  --bg-brand-primary:#001e2b;
  --bg-brand-secondary:#001e2b;
  --bg-success-primary:#0f2e1e;
  --bg-success-solid:#165033;
  --bg-error-primary:#2a1014;         /* derived */
  --bg-warning-primary:#2a1c08;       /* derived */
  --bg-purple-primary:#1a0840;
  --bg-surface-default:#000000;
  --bg-input-normal:#24292f;
  --bg-overlay:rgba(0,0,0,0);

  /* ─── Text ─── */
  --text-primary:#f6f8fa;
  --text-base-primary:#ffffff;        /* derived */
  --text-secondary:#c1c7cd;
  --text-tertiary:#a2a9b1;            /* = fg-tertiary(600) */
  --text-quaternary:#a2a9b1;
  --text-quinary:#7d8590;             /* = fg-quinary(400) */
  --text-disabled:#7d8590;            /* derived */
  --text-placeholder:#7d8590;         /* derived */
  --text-brand:#008ee5;
  --text-success:#8bd18b;
  --text-error:#f85149;               /* derived */
  --text-warning:#d29922;             /* derived */
  --text-purple:#b689d6;
  --text-on-brand:#ffffff;

  /* ─── Borders ─── */
  --border-primary:#545d68;           /* derived */
  --border-secondary:#3b434b;
  --border-surface:#000000;
  --border-brand:#008ee5;             /* = fg-brand (derived) */
  --border-action-normal:#3b434b;     /* derived */
  --border-disabled:#3b434b;          /* = border-secondary (light equality) */

  /* ─── Foreground / Icons ─── */
  --fg-brand:#008ee5;
  --fg-success:#8bd18b;               /* = text-success (derived) */
  --fg-warning:#d29922;               /* derived */
  --fg-purple:#b689d6;                /* = text-purple (derived) */
  --fg-tertiary:#a2a9b1;
  --fg-quaternary:#7d8590;            /* derived */
  --fg-quinary:#7d8590;
  --fg-error:#f85149;                 /* derived */

  /* ─── Legacy aliases ─── */
  --bg-primary-hover:#24292f;
  --bg-tertiary:#3b434b;              /* = border-secondary (light equality) */
  --bg-canvas:#000000;
  --brand-text:#008ee5;   --brand-bg:#001e2b;
  --success-text:#8bd18b; --success-bg:#0f2e1e;
  --warning-text:#d29922; --warning-bg:#2a1c08;
  --error-text:#f85149;   --error-bg:#2a1014;
  --purple-text:#b689d6;  --purple-bg:#1a0840;

  /* ─── Shadows ─── */
  --shadow-xs:0px 1px 2px 0px rgba(1,4,9,.5);
  --shadow-md:0px 4px 16px 0px rgba(1,4,9,.6);
  --shadow-lg:0px 10px 16px -3px rgba(0,0,0,.5),0px 3px 6px -2px rgba(0,0,0,.4);
  --shadow-modal:0px 12px 16px 0px rgba(0,0,0,.5),0px 4px 6px 0px rgba(0,0,0,.4);
  --shadow-input:0px 1px 1px rgba(0,0,0,.4);

  /* ─── Focus ring & scrim ─── */
  --focus-ring:rgba(88,166,255,.4);
  --bg-scrim:rgba(0,0,0,.6);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  font-size:14px;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;}

::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-secondary);border-radius:999px;border:2px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-thumb:hover{background:var(--border-primary);background-clip:content-box;}

.app{display:flex;height:100%;width:100%;background:var(--bg-primary);}

/* ---------- Sidebar ---------- */
.sidebar{
  width:280px;flex-shrink:0;height:100%;display:flex;flex-direction:column;
  background:var(--bg-primary);border-right:1px solid var(--border-secondary);
  transition:width .2s ease, margin-left .2s ease;
}
.sidebar.collapsed{width:0;margin-left:0;overflow:hidden;border-right:none;}
.sb-top{display:flex;flex-direction:column;}
.sb-dropdown{display:flex;gap:4px;align-items:center;height:32px;padding:6px 8px;border-radius:var(--radius-lg);cursor:pointer;border:1px solid transparent;}
.sb-dropdown:hover{background:var(--bg-primary-hover);}
.sb-dropdown.open{border-color:var(--border-brand);box-shadow:0 0 0 2px var(--focus-ring);outline:none;}
.sb-company{position:relative;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--border-secondary);}
/* company dropdown menu */
.co-menu{position:absolute;top:calc(100% + 4px);left:8px;right:8px;z-index:100;
  background:var(--bg-primary);border:1px solid var(--border-secondary);
  border-radius:var(--radius-xl);padding:4px 0;
  box-shadow:var(--shadow-lg);}
.co-item{height:36px;display:flex;align-items:center;padding:0 4px;cursor:pointer;}
.co-item-wrap{height:32px;display:flex;align-items:center;gap:4px;flex:1;padding:0 8px;border-radius:var(--radius-lg);}
.co-item:hover .co-item-wrap{background:var(--bg-primary-hover);}
.co-item-wrap.co-active{background:var(--bg-primary-hover);}
.co-item-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;padding:0 4px;}
.co-item-check{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--brand-text);flex-shrink:0;}
.co-item-check i{font-size:16px;}
.co-add{height:36px;display:flex;align-items:center;padding:0 4px;cursor:pointer;}
.co-add-wrap{height:32px;display:flex;align-items:center;gap:4px;flex:1;padding:0 8px;border-radius:var(--radius-lg);}
.co-add:hover .co-add-wrap{background:var(--bg-primary-hover);}
.co-add:hover .co-add-icon,.co-add:hover .co-add-label{color:var(--text-primary);}
.co-add-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:16px;}
.co-add-label{font-size:14px;color:var(--text-secondary);padding:0 4px;}
.co-divider{height:1px;background:var(--border-secondary);margin:4px 0;}
.co-action{height:36px;display:flex;align-items:center;padding:0 4px;cursor:pointer;}
.co-action-wrap{height:32px;display:flex;align-items:center;gap:4px;flex:1;padding:0 8px;border-radius:var(--radius-lg);}
.co-action:hover .co-action-wrap{background:var(--bg-primary-hover);}
.co-action:hover .co-action-icon i,.co-action:hover .co-action-label{color:var(--text-primary);}
.co-action-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.co-action-icon i{font-size:16px;color:var(--text-secondary);}
.co-action-label{flex:1;font-size:14px;padding:0 4px;}
.sb-scroll{flex:1;overflow-y:auto;padding:10px 0;}
.sb-bottom{padding-bottom:12px;padding-top:8px;}
.sb-label{padding:2px 12px;margin-top:10px;}
.sb-scroll > .sb-label:first-child{margin-top:0;}
.sb-label-inner{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--radius-lg);}
.sb-label:hover .sb-label-inner{background:var(--bg-primary-hover);}
.sb-label.active .sb-label-inner{background:var(--bg-active);}
.sb-label-head{flex:1;min-width:0;display:flex;align-items:center;gap:4px;cursor:pointer;}
.sb-label-text{font-size:12px;line-height:18px;font-weight:500;color:var(--text-secondary);}
.sb-label-chev{font-size:14px;color:var(--text-tertiary);transition:transform .12s;display:none;}
.sb-label:hover .sb-label-chev{display:inline-block;}
.sb-label-chev.collapsed{display:inline-block;transform:rotate(-90deg);}
.sb-label-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .12s;flex-shrink:0;}
.sb-label:hover .sb-label-actions{opacity:1;}
.sb-label-act{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:var(--radius-xs);
  color:var(--text-tertiary);cursor:pointer;background:none;border:none;}
.sb-label-act:hover{background:var(--bg-tertiary);color:var(--text-primary);}
.sb-label-act i{font-size:16px;}
.sb-cell{margin:0 12px;padding:2px 0;}
.sb-row{
  display:flex;gap:4px;align-items:center;height:32px;padding:6px 8px;
  border-radius:var(--radius-lg);cursor:pointer;color:var(--text-primary);
  font-size:14px;font-weight:500;line-height:20px;
}
.sb-row:hover{background:var(--bg-primary-hover);}
.sb-row.active{background:var(--bg-active);}
.sb-row i{font-size:16px;color:var(--text-tertiary);width:16px;flex-shrink:0;}
.sb-row .txt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;}
.sb-row .prefix{color:var(--text-tertiary);font-weight:400;margin-right:4px;}

/* avatar pill */
.av{
  border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;
  font-weight:500;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center;
  border:1px solid var(--border-secondary);
}

/* row hover actions (drag handle + favorite star), shown on hover */
.sb-actions{margin-left:auto;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .12s;flex-shrink:0;}
.sb-row:hover .sb-actions{opacity:1;}
.sb-act{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:var(--radius-xs);
  color:var(--text-tertiary);font-size:16px;cursor:pointer;padding:0;border:none;background:none;}
.sb-act:hover{background:var(--bg-tertiary);color:var(--text-primary);}
.sb-act.grip{cursor:grab;}
.sb-act.starred{color:var(--text-tertiary);}
.sb-row.sb-dragging{opacity:.4;}
.sb-drag-indicator{display:flex;align-items:center;margin:0 12px;padding:2px 0;}
.sb-drag-dot{width:8px;height:8px;border-radius:999px;border:2px solid var(--text-secondary);background:var(--bg-primary);box-sizing:border-box;flex-shrink:0;}
.sb-drag-line{flex:1;height:2px;background:var(--text-secondary);margin-left:-1px;}
/* static row (no hover bg) — e.g. Dark mode row */
.sb-row.sb-static{cursor:default;}
.sb-row.sb-static:hover{background:transparent;}

/* toggle */
.toggle{width:34px;height:20px;border-radius:999px;background:var(--bg-tertiary);position:relative;transition:background .15s;flex-shrink:0;border:none;padding:0;cursor:pointer;}
.toggle.on{background:var(--brand-text);}
.toggle .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:999px;background:var(--text-on-brand);box-shadow:var(--shadow-xs);transition:left .15s;}
.toggle.on .knob{left:16px;}

/* ---------- Interaction area ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;background:var(--bg-primary);overflow:hidden;}
.board-area{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;min-height:0;}
.header{
  height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:1px solid var(--border-secondary);
}
.hgroup{display:flex;gap:8px;align-items:center;}
.icon-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:var(--radius-lg);color:var(--text-tertiary);flex-shrink:0;}
.icon-btn:hover{background:var(--bg-primary-hover);color:var(--text-primary);}
.icon-btn i{font-size:16px;}
.hdropdown{display:flex;gap:4px;align-items:center;height:32px;padding:6px 8px;border-radius:var(--radius-lg);font-weight:500;cursor:pointer;}
.hdropdown:hover{background:var(--bg-primary-hover);}
.hdropdown i{font-size:16px;color:var(--text-tertiary);}
.dd-text{display:flex;align-items:center;padding:0 4px;}
.hdd-wrap{position:relative;}
.bd-menu{position:absolute;top:calc(100% + 4px);left:0;width:360px;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:12px;padding:4px 0;box-shadow:var(--shadow-lg);z-index:300;}
.bd-top{display:flex;align-items:center;gap:4px;padding-right:12px;}
.bd-cell{padding:2px 6px;}
.bd-top .bd-cell{flex:1;min-width:0;}
.bd-cell-inner{display:flex;align-items:center;gap:4px;height:32px;padding:6px;border-radius:10px;}
.bd-cell.clickable{cursor:pointer;}
.bd-cell.clickable:hover .bd-cell-inner{background:var(--bg-primary-hover);}
.bd-cell-inner>i{font-size:16px;color:var(--text-tertiary);flex-shrink:0;}
.bd-cell-name{flex:1;min-width:0;padding:0 4px;font-size:14px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bd-cell-prefix{color:var(--text-tertiary);font-weight:400;margin-right:4px;}
.bd-top-btn{width:32px;height:32px;border-radius:10px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0;}
.bd-top-btn:hover{background:var(--bg-secondary);}
.bd-top-btn i{font-size:16px;}
.bd-divider{padding:4px 0;}
.bd-divider-line{height:1px;background:var(--border-secondary);}
.bd-sections{display:flex;flex-direction:column;gap:4px;}
.bd-label{padding:6px 12px;font-size:12px;font-weight:500;line-height:18px;color:var(--text-secondary);}

.tabs{display:flex;align-items:center;gap:0;}
.tab{padding:6px 12px;border-radius:var(--radius-lg);font-size:14px;font-weight:500;letter-spacing:-.1px;
  color:var(--text-secondary);white-space:nowrap;line-height:20px;}
.tab:hover:not(.active){background:var(--bg-primary-hover);color:var(--text-primary);}
.tab.active{background:var(--bg-active);color:var(--text-primary);}

.toolbar{
  height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:1px solid var(--border-secondary);
}
.tb-btn{
  display:flex;align-items:center;gap:2px;height:32px;padding:6px 10px;border-radius:var(--radius-lg);
  border:1px solid var(--border-secondary);background:var(--bg-primary);box-shadow:var(--shadow-xs);
  color:var(--text-primary);font-size:14px;font-weight:500;
}
.tb-btn .btn-label{padding:0 4px;}
.tb-btn:hover{background:var(--bg-primary-hover);}
.tb-btn i{font-size:16px;color:var(--text-tertiary);}
.tb-btn.active{border-color:var(--brand-text);color:var(--text-primary);box-shadow:0 0 0 2px var(--focus-ring);}
.tb-btn.active i{color:var(--text-tertiary);}
.tb-btn.primary{background:var(--brand-text);border-color:var(--brand-text);color:var(--text-on-brand);}
.tb-btn.primary:hover{filter:brightness(.95);}
.tb-btn.primary:disabled{background:var(--bg-secondary);border-color:var(--bg-secondary);color:var(--text-disabled);box-shadow:var(--shadow-xs);opacity:1;cursor:not-allowed;filter:none;}
.tb-badge{display:flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:2px 4px;
  border-radius:var(--radius-sm);background:var(--bg-secondary);color:var(--text-secondary);font-size:12px;font-weight:500;margin-left:2px;}
.tb-btn.value-active{border-color:var(--border-brand);background:var(--bg-brand-primary);color:var(--text-brand);box-shadow:none;}
.tb-btn.value-active i{color:var(--text-brand);}
.tb-group{display:flex;align-items:center;gap:8px;}
/* Sort / Group menus */
.sg-menu{width:240px;padding:12px;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:12px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;gap:16px;z-index:300;}
.sg-field{display:flex;flex-direction:column;gap:6px;}
.sg-label{font-size:12px;font-weight:500;color:var(--text-secondary);}
.sg-select{position:relative;height:32px;border-radius:10px;border:1px solid var(--border-secondary);background:var(--bg-primary);filter:drop-shadow(var(--shadow-input));}
.sg-select select{width:100%;height:100%;border:none;background:none;outline:none;padding:0 32px 0 10px;font-size:14px;color:var(--text-primary);cursor:pointer;-webkit-appearance:none;appearance:none;border-radius:10px;}
.sg-select i{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-tertiary);pointer-events:none;}
.sg-select.disabled{background:var(--bg-disabled-subtle);filter:none;}
.sg-select.disabled select{color:var(--text-disabled);cursor:not-allowed;}
.sg-toggle-row{display:flex;align-items:center;gap:8px;}
.sg-toggle{width:26px;height:16px;border-radius:999px;background:var(--bg-tertiary);border:none;padding:0;position:relative;cursor:pointer;flex-shrink:0;transition:background .15s;}
.sg-toggle .knob{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:999px;background:var(--text-on-brand);transition:left .15s,background .15s;}
.sg-toggle.on{background:var(--bg-brand-solid);}
.sg-toggle.on .knob{left:12px;}
.sg-toggle.disabled{background:var(--bg-secondary);cursor:not-allowed;}
.sg-toggle.disabled .knob{background:var(--bg-disabled-subtle);}
.sg-toggle-label{font-size:14px;font-weight:500;color:var(--text-primary);}
.sg-toggle-label.disabled{color:var(--text-disabled);}
.disp-menu{width:240px;max-height:70vh;overflow-y:auto;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:12px;padding:4px 0;box-shadow:var(--shadow-lg);z-index:200;}
.disp-opt{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;height:36px;padding:8px 12px;border:none;background:none;cursor:pointer;text-align:left;}
.disp-opt:hover{background:var(--bg-primary-hover);}
.disp-opt.disabled{cursor:not-allowed;}
.disp-opt.disabled .disp-label{color:var(--text-disabled);}
.disp-label{font-size:14px;color:var(--text-primary);}
.disp-divider{height:1px;background:var(--border-secondary);margin:4px 0;}
.sg-toggle.disabled{opacity:.5;}
.bl-group-row td{border-bottom:1px solid var(--border-secondary);height:36px;user-select:none;}
.bl-group-row.primary td{background:var(--bg-secondary-subtle);}
.bl-group-row.sub td{background:var(--bg-primary);}
.bl-group-row .bl-sticky-check{position:sticky;left:0;z-index:1;}
.bl-group-row.primary td.bl-sticky-check{background:var(--bg-secondary-subtle);}
.bl-group-row.sub td.bl-sticky-check{background:var(--bg-primary);}
.bl-table td.bl-group-cell{padding:0;cursor:pointer;}
.bl-group-inner{display:flex;align-items:center;padding:8px 12px;white-space:nowrap;}
.bl-group-cell:hover .bl-group-inner{background:var(--bg-primary-hover);}
.bl-group-chev{width:16px;height:16px;margin-right:4px;font-size:16px;color:var(--text-tertiary);transition:transform .15s ease;flex-shrink:0;}
.bl-group-chev.collapsed{transform:rotate(-90deg);}
.bl-group-name{font-size:14px;line-height:20px;color:var(--text-primary);}
.bl-group-row.primary .bl-group-name{font-weight:600;}
.bl-group-row.sub .bl-group-name{font-weight:500;}
.bl-group-member{display:inline-flex;align-items:center;gap:6px;}
.bl-group-member .bl-av{margin-right:0;}
/* count — gray Badge variant */
.bl-group-count{margin-left:8px;display:inline-flex;align-items:center;background:var(--bg-secondary);color:var(--text-secondary);padding:2px 4px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;line-height:16px;}

/* ---------- Filter menu (popover) ---------- */
.filter-wrap{position:relative;}
.fm-overlay{position:fixed;inset:0;z-index:40;}
.filter-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:50;width:560px;max-width:calc(100vw - 40px);
  background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:var(--radius-xl);
  box-shadow:var(--shadow-md);overflow:hidden;display:flex;flex-direction:column;}
.fm-search{display:flex;align-items:center;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border-secondary);}
.fm-search i{font-size:16px;color:var(--text-tertiary);}
.fm-search input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--text-primary);}
.fm-search input::placeholder{color:var(--text-quaternary);}
.fm-body{display:flex;max-height:520px;min-height:240px;}
.fm-cats{width:200px;flex-shrink:0;border-right:1px solid var(--border-secondary);padding:4px;
  display:flex;flex-direction:column;overflow-y:auto;}
.fm-cat{display:flex;align-items:center;gap:4px;padding:6px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:14px;color:var(--text-primary);}
.fm-cat:hover{background:var(--bg-primary-hover);}
.fm-cat.active{background:var(--bg-primary-hover);}
.fm-cat > i:first-child{font-size:16px;color:var(--text-tertiary);}
.fm-cat-label{flex:1;padding:0 4px;}
.fm-cat-count{height:18px;padding:0 6px;border-radius:var(--radius-sm);background:var(--bg-secondary);
  color:var(--text-secondary);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;}
.fm-chev{font-size:16px;color:var(--text-quaternary);}
.fm-options{flex:1;min-width:0;overflow-y:auto;padding:4px;display:flex;flex-direction:column;}
.fm-opt{display:flex;align-items:center;gap:8px;padding:6px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:14px;color:var(--text-primary);}
.fm-opt:hover{background:var(--bg-primary-hover);}
.fm-opt input[type=checkbox]{appearance:none;-webkit-appearance:none;margin:0 2px 0 0;flex-shrink:0;
  width:16px;height:16px;border:1px solid var(--border-secondary);border-radius:var(--radius-xs);
  background:var(--bg-primary);box-shadow:var(--shadow-xs);cursor:pointer;position:relative;}
.fm-opt input[type=checkbox]:hover{border-color:var(--brand-text);}
.fm-opt input[type=checkbox]:checked{background:var(--brand-text);border-color:var(--brand-text);}
.fm-opt input[type=checkbox]:checked::after{content:"";position:absolute;left:5px;top:2px;width:3.5px;height:7px;
  border:solid var(--text-on-brand);border-width:0 2px 2px 0;transform:rotate(45deg);}
.fm-opt input[type=radio]{appearance:none;-webkit-appearance:none;margin:0 2px 0 0;flex-shrink:0;
  width:16px;height:16px;border:1px solid var(--border-secondary);border-radius:999px;
  background:var(--bg-primary);box-shadow:var(--shadow-xs);cursor:pointer;position:relative;}
.fm-opt input[type=radio]:hover{border-color:var(--brand-text);}
.fm-opt input[type=radio]:checked{
  border:2px solid var(--brand-text);
  background:radial-gradient(circle, var(--brand-text) 50%, transparent 50%);}
.fm-opt-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fm-dot{width:8px;height:8px;border-radius:999px;flex-shrink:0;margin:0 6px;}
.fm-empty{padding:16px;color:var(--text-tertiary);font-size:13px;text-align:center;}
.fm-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;
  border-top:1px solid var(--border-secondary);background:var(--bg-primary);}
.fm-applied{font-size:12px;color:var(--text-secondary);}
.fm-actions{display:flex;gap:8px;}
.fm-btn{height:24px;padding:4px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;
  border:1px solid var(--border-secondary);background:var(--bg-primary);color:var(--text-secondary);box-shadow:var(--shadow-xs);cursor:pointer;}
.fm-btn:hover:not(:disabled){background:var(--bg-primary-hover);}
.fm-btn.primary{background:var(--brand-text);border-color:var(--brand-text);color:var(--text-on-brand);}
.fm-btn.primary:hover:not(:disabled){background:var(--bg-brand-solid-hover);border-color:var(--bg-brand-solid-hover);}
.fm-btn:disabled{opacity:.5;cursor:not-allowed;}

/* avatar group */
.av-group{display:flex;align-items:center;}
.av-btn{display:flex;padding:0;border:none;background:none;cursor:pointer;border-radius:999px;margin-right:-4px;transition:transform .1s;}
.av-btn .av{border:2px solid var(--border-surface);}
.av-btn:hover{transform:translateY(-2px);}
.av-btn.active .av{outline:2px solid var(--brand-text);outline-offset:1px;}
.av-more{width:32px;height:32px;border-radius:999px;border:2px solid var(--border-surface);background:var(--bg-secondary);
  color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.av-more:hover{background:var(--bg-tertiary);}
.av-addwrap{position:relative;margin-left:8px;}
.av-add{
  width:32px;height:32px;border-radius:999px;border:1px dashed var(--border-primary);
  display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);
  box-shadow:var(--shadow-xs);background:var(--bg-primary);
}
.av-add:hover{border-color:var(--brand-text);color:var(--brand-text);}
.av-add.active{border:1px solid var(--border-brand);background:var(--bg-primary);color:var(--text-brand);box-shadow:0 0 0 2px var(--focus-ring);}
.av-more.active{border-color:var(--border-brand);box-shadow:0 0 0 2px var(--focus-ring);}
.av-menu{position:absolute;top:calc(100% + 6px);right:0;z-index:50;width:240px;background:var(--bg-primary);
  border:1px solid var(--border-secondary);border-radius:var(--radius-xl);box-shadow:var(--shadow-md);padding:4px;}
.av-menu-title{padding:6px 8px;font-size:12px;font-weight:600;color:var(--text-tertiary);}
.av-menu-opt{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:var(--radius-sm);
  background:none;border:none;cursor:pointer;font-size:14px;color:var(--text-primary);text-align:left;}
.av-menu-opt > span{flex:1;}
.av-menu-opt > i{color:var(--text-tertiary);}
.av-menu-opt:hover{background:var(--bg-primary-hover);}
.av-menu-empty{padding:10px 8px;font-size:13px;color:var(--text-tertiary);text-align:center;}
.mem-menu{position:absolute;top:calc(100% + 6px);right:0;z-index:60;width:320px;max-height:468px;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:var(--radius-xl);box-shadow:var(--shadow-md);display:flex;flex-direction:column;overflow:hidden;}
.mem-search{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border-secondary);flex-shrink:0;}
.mem-search i{font-size:16px;color:var(--text-tertiary);flex-shrink:0;}
.mem-search input{flex:1;min-width:0;border:none;outline:none;background:none;font-size:14px;color:var(--text-primary);letter-spacing:-.1px;}
.mem-search input::placeholder{color:var(--text-tertiary);}
.mem-list{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:var(--border-secondary) transparent;}
.mem-opt{display:block;width:100%;padding:2px 8px;border:none;background:none;cursor:pointer;text-align:left;}
.mem-opt-inner{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:10px;}
.mem-opt:hover .mem-opt-inner{background:var(--bg-primary-hover);}
.mem-opt.active .mem-opt-inner{background:var(--bg-primary-hover);}
.mem-opt .av{flex-shrink:0;}
.mem-opt-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.mem-opt-name{font-size:14px;font-weight:500;line-height:20px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mem-opt-handle{font-size:12px;line-height:16px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mem-opt-check{font-size:18px;color:var(--brand-text);flex-shrink:0;}
.mem-check{width:16px;height:16px;border:1px solid var(--border-primary);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.mem-check.checked{background:var(--brand-text);border-color:var(--brand-text);}
.mem-check i{font-size:12px;color:var(--text-on-brand);}
.mem-footer{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border-secondary);flex-shrink:0;}
.mem-add-btn{display:inline-flex;align-items:center;gap:4px;height:24px;padding:4px 8px;border:1px solid var(--border-secondary);border-radius:var(--radius-md);background:var(--bg-primary);font-size:12px;font-weight:500;color:var(--text-primary);cursor:pointer;box-shadow:var(--shadow-xs);}
.mem-add-btn i{font-size:14px;}
.mem-cancel{flex:1;height:24px;padding:2px 6px;border:1px solid var(--border-secondary);border-radius:var(--radius-md);background:var(--bg-primary);font-size:12px;font-weight:500;color:var(--text-primary);cursor:pointer;box-shadow:var(--shadow-xs);}
.mem-cancel:hover{background:var(--bg-secondary);}
.mem-apply{flex:1;height:24px;padding:2px 6px;border:none;border-radius:var(--radius-md);background:var(--brand-text);color:var(--text-on-brand);font-size:12px;font-weight:500;cursor:pointer;box-shadow:var(--shadow-xs);}
.mem-apply:disabled{opacity:.5;cursor:default;}
.mem-empty{padding:16px 12px;font-size:14px;color:var(--text-tertiary);text-align:center;}

/* ---------- Board ---------- */
/* Info panel */
.info-panel{position:absolute;top:0;right:-400px;width:400px;height:100%;background:var(--bg-primary);border-left:1px solid var(--border-secondary);display:flex;flex-direction:column;gap:2px;overflow:hidden;z-index:100;transition:right .2s cubic-bezier(.4,0,.2,1);}
.info-panel.open{right:0;}
.info-panel.in-backlog{top:112px;height:calc(100% - 112px);}
.ip-header{display:flex;flex-direction:column;flex-shrink:0;}
.ip-header-row1{height:56px;padding:12px 20px;display:flex;align-items:center;}
.ip-header-row2{height:32px;padding:0 20px;flex-shrink:0;}
.ip-title{flex:1;font-size:18px;font-weight:500;color:var(--text-primary);line-height:28px;}
.ip-close{width:32px;height:32px;padding:8px;border:none;background:none;cursor:pointer;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);}
.ip-close:hover{background:var(--bg-secondary);}
.ip-tab-menu{display:flex;gap:2px;background:var(--bg-secondary);border-radius:10px;padding:2px;width:100%;}
.ip-tab-btn{flex:1;height:28px;padding:4px 8px;border-radius:10px;background:var(--bg-secondary);font-size:14px;font-weight:500;line-height:20px;letter-spacing:-0.1px;text-align:center;white-space:nowrap;color:var(--text-secondary);border:none;cursor:pointer;}
.ip-tab-btn.active{background:var(--bg-tertiary);color:var(--text-primary);}
.ip-tab-btn.disabled{color:var(--text-disabled);cursor:not-allowed;}
.ip-content{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-secondary) transparent;}
.ip-activity{padding-top:16px;}
.ip-content::-webkit-scrollbar{width:4px;}
.ip-content::-webkit-scrollbar-thumb{background:var(--border-secondary);border-radius:2px;}
.ip-content::-webkit-scrollbar-track{background:transparent;}
.ip-date-label{height:32px;padding:2px 12px;display:flex;align-items:center;}
.ip-date-label-inner{padding:4px 8px;}
.ip-date-label-text{font-size:12px;font-weight:500;line-height:18px;color:var(--text-secondary);white-space:nowrap;}
.ip-msg-row{display:flex;gap:12px;align-items:flex-start;padding:12px 20px;cursor:pointer;}
.ip-msg-row:hover{background:var(--bg-secondary);}
.ip-msg-av{width:32px;height:32px;border-radius:999px;border:1px solid var(--border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;overflow:hidden;position:relative;}
.ip-msg-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.ip-msg-head{display:flex;align-items:center;gap:4px;width:100%;}
.ip-msg-name{font-size:14px;font-weight:500;line-height:20px;color:var(--text-base-primary);white-space:nowrap;flex-shrink:0;}
.ip-msg-time{font-size:12px;font-weight:400;line-height:18px;color:var(--text-secondary);padding-top:2px;white-space:nowrap;}
.ip-msg-text{font-size:14px;font-weight:400;line-height:20px;color:var(--text-primary);word-break:break-word;}
.ip-search{display:flex;align-items:center;gap:4px;padding:20px 12px 12px 20px;flex-shrink:0;}
.ip-search-box{flex:1;height:32px;border-radius:10px;border:1px solid var(--border-secondary);padding:0 8px;display:flex;align-items:center;gap:4px;filter:drop-shadow(var(--shadow-input));}
.ip-search-box i{font-size:16px;color:var(--text-quaternary);flex-shrink:0;}
.ip-search-box input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--text-primary);letter-spacing:-0.1px;}
.ip-search-box input::placeholder{color:var(--text-quaternary);}
.ip-search-act{width:32px;height:32px;padding:8px;border-radius:10px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ip-search-act:hover{background:var(--bg-secondary);}
.ip-search-act.active{background:var(--bg-brand-primary);color:var(--text-brand);}
.ip-tag-group{padding:8px 0;}
.ip-group-label{height:32px;padding:2px 12px;cursor:pointer;display:flex;align-items:center;}
.ip-group-label-inner{flex:1;display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:10px;}
.ip-group-label:hover .ip-group-label-inner{background:var(--bg-secondary);}
.ip-group-label-left{display:flex;align-items:center;gap:4px;flex:1;}
.ip-group-label-text{font-size:12px;font-weight:500;line-height:18px;color:var(--text-secondary);}
.ip-group-chevron{font-size:14px;color:var(--text-tertiary);transition:transform .15s ease;flex-shrink:0;display:none;}
.ip-group-label:hover .ip-group-chevron{display:inline-block;}
.ip-group-chevron.collapsed{display:inline-block;transform:rotate(-90deg);}
.ip-group-actions{display:none;gap:4px;align-items:center;flex-shrink:0;}
.ip-group-label:hover .ip-group-actions{display:flex;}
.ip-group-act-btn{width:20px;height:20px;border-radius:4px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.ip-group-act-btn:hover{background:var(--bg-tertiary);}
.ip-tag-row{padding:2px 6px;cursor:pointer;height:36px;display:flex;align-items:center;}
.ip-tag-row-inner{flex:1;padding:6px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
.ip-tag-row:hover .ip-tag-row-inner{background:var(--bg-secondary);}
.ip-tag-row-inner.selected{background:var(--bg-secondary);}
.ip-tag-options{padding:0 8px;}
.ip-badge{display:inline-flex;align-items:center;gap:0;padding:2px 4px;border-radius:6px;}
.ip-badge-dot{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.ip-badge-dot::before{content:"";width:6px;height:6px;border-radius:999px;background:currentColor;}
.ip-badge-label{font-size:12px;font-weight:500;padding:0 3px;}
.ip-tag-right{display:flex;align-items:center;gap:4px;}
.ip-tag-count{font-size:12px;color:var(--text-quaternary);padding:0 4px;height:20px;display:flex;align-items:center;}
.ip-tag-act-btn{display:none;width:20px;height:20px;border-radius:4px;border:none;cursor:pointer;align-items:center;justify-content:center;padding:0;color:var(--text-secondary);}
.ip-tag-act-btn i{font-size:16px;}
.ip-tag-act-btn.more{background:transparent;}
.ip-tag-act-btn.more:hover{background:var(--bg-tertiary);}
.ip-tag-row:hover .ip-tag-act-btn.more{display:flex;}
.ip-tag-row-inner.selected .ip-tag-act-btn.more,.ip-tag-row-inner.menu-open .ip-tag-act-btn.more{display:flex;}
.ip-tag-filtered{display:inline-flex;align-items:center;gap:2px;height:20px;padding:2px 6px;border-radius:6px;background:var(--bg-primary);border:1px solid var(--border-secondary);box-shadow:var(--shadow-xs);font-size:12px;font-weight:500;color:var(--text-secondary);white-space:nowrap;}
.ip-tag-filtered i{font-size:14px;color:var(--text-tertiary);}
.ip-wsv-block{padding:8px 0;}
.ip-wsv-row{padding:2px 8px;}
.ip-wsv-inner{height:32px;padding:6px 8px;display:flex;align-items:center;gap:4px;border-radius:10px;}
.ip-wsv-row.clickable{cursor:pointer;}
.ip-wsv-row.clickable:hover .ip-wsv-inner{background:var(--bg-secondary);}
.ip-wsv-inner i.lead{font-size:16px;color:var(--text-tertiary);flex-shrink:0;}
.ip-wsv-left{flex:1;min-width:0;display:flex;align-items:center;gap:4px;}
.ip-wsv-name{min-width:0;padding:0 4px;font-size:14px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ip-wsv-chev{font-size:16px;color:var(--text-tertiary);transition:transform .15s ease;flex-shrink:0;display:none;}
.ip-wsv-row:hover .ip-wsv-chev{display:inline-block;}
.ip-wsv-chev.collapsed{display:inline-block;transform:rotate(-90deg);}
.ip-wsv-groups{padding-left:20px;}
.ip-tag-row-inner.menu-open{background:var(--bg-secondary);}
.ip-ctx-menu{position:fixed;width:240px;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:12px;padding:4px 0;box-shadow:var(--shadow-lg);z-index:200;}
.ip-ctx-item{display:block;width:100%;padding:2px 6px;border:none;background:none;cursor:pointer;}
.ip-ctx-item-wrap{display:flex;align-items:center;gap:4px;padding:6px;border-radius:10px;}
.ip-ctx-item:hover .ip-ctx-item-wrap{background:var(--bg-secondary);}
.ip-ctx-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0;}
.ip-ctx-icon i{font-size:16px;}
.ip-ctx-label{flex:1;min-width:0;padding:0 4px;font-size:14px;line-height:20px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;}
.ip-ctx-divider{height:1px;background:var(--bg-tertiary);margin:4px 0;}
.ip-tag-rename{display:flex;width:100%;}
.ip-rename-input{flex:1;min-width:0;height:32px;padding:6px 8px;border:1px solid var(--border-brand);border-radius:10px 0 0 10px;outline:none;font-size:14px;letter-spacing:-.1px;color:var(--text-primary);background:var(--bg-primary);box-shadow:0 0 0 2px var(--focus-ring);}
.ip-rename-input::placeholder{color:var(--text-quaternary);}
.ip-rename-save{height:32px;padding:6px 14px;background:var(--bg-brand-solid);color:var(--text-on-brand);font-size:14px;font-weight:500;border:none;border-radius:0 10px 10px 0;cursor:pointer;box-shadow:var(--shadow-xs);white-space:nowrap;}
.ip-cp{position:fixed;width:240px;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:12px;box-shadow:var(--shadow-lg);z-index:210;}
.ip-cp-grid{display:flex;flex-wrap:wrap;gap:12px;padding:12px;}
.ip-cp-sw{width:32px;height:32px;border-radius:999px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.ip-cp-sw i{font-size:16px;color:var(--text-on-brand);}
.ip-cp-add{width:32px;height:32px;border-radius:999px;border:1px dashed var(--border-primary);background:var(--bg-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;box-shadow:var(--shadow-xs);color:var(--text-secondary);}
.ip-cp-add i{font-size:16px;}
.ip-cp-clear-wrap{padding:12px;border-top:1px solid var(--border-secondary);}
.ip-cp-clear{width:100%;height:24px;border:1px solid var(--border-secondary);border-radius:8px;background:var(--bg-primary);font-size:12px;font-weight:500;color:var(--text-primary);cursor:pointer;box-shadow:var(--shadow-xs);}
.ip-cp-clear:hover{background:var(--bg-secondary);}
.ip-cp-palette{padding:12px;display:flex;flex-direction:column;gap:12px;}
.ip-cp-area{position:relative;width:100%;height:120px;border-radius:8px;cursor:crosshair;}
.ip-cp-ring{position:absolute;width:14px;height:14px;border-radius:999px;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.35);transform:translate(-50%,-50%);pointer-events:none;}
.ip-cp-hue{width:100%;-webkit-appearance:none;appearance:none;height:12px;border-radius:999px;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);cursor:pointer;outline:none;}
.ip-cp-hue::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:999px;background:var(--text-on-brand);border:1px solid var(--border-primary);box-shadow:var(--shadow-xs);cursor:pointer;}
.ip-cp-hsl{display:flex;align-items:center;gap:8px;}
/* segmented value group: one rounded border with dividers between cells */
.ip-cp-fields{flex:1;min-width:0;display:flex;align-items:center;height:28px;border:1px solid var(--border-secondary);border-radius:8px;overflow:hidden;background:var(--bg-primary);}
.ip-cp-fields input{flex:1;min-width:0;width:100%;height:100%;border:none;border-left:1px solid var(--border-secondary);padding:0 6px;font-size:12px;text-align:center;outline:none;color:var(--text-primary);background:transparent;}
.ip-cp-fields input:first-child{border-left:none;}
.ip-cp-fields:focus-within{border-color:var(--border-brand);box-shadow:0 0 0 2px var(--focus-ring);}
.ip-cp-hex{text-align:left!important;}
/* mode dropdown (HSL / RGB / HEX) */
.ip-cp-mode{position:relative;flex-shrink:0;}
.ip-cp-mode-btn{display:flex;align-items:center;gap:2px;height:28px;padding:0 4px 0 8px;border:1px solid var(--border-secondary);border-radius:8px;background:var(--bg-primary);font-size:12px;color:var(--text-primary);cursor:pointer;}
.ip-cp-mode-btn i{font-size:14px;color:var(--text-tertiary);}
.ip-cp-mode-btn.open{border-color:var(--border-brand);box-shadow:0 0 0 2px var(--focus-ring);outline:none;}
/* dropdown chevrons flip up when the dropdown is open (applies to all dropdowns) */
.ds-dd i,.ip-cp-mode-btn i,.tb-btn i.ri-arrow-down-s-line{transition:transform .15s ease;}
.ds-dd.open i,.ip-cp-mode-btn.open i,.tb-btn.active i.ri-arrow-down-s-line{transform:rotate(180deg);}
.ip-cp-mode-menu{position:absolute;bottom:calc(100% + 4px);left:0;width:72px;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:8px;box-shadow:var(--shadow-lg);padding:4px 0;z-index:10;}
.ip-cp-mode-opt{display:flex;align-items:center;width:100%;padding:6px 8px;border:none;background:none;font-size:12px;color:var(--text-primary);cursor:pointer;text-align:left;}
.ip-cp-mode-opt:hover{background:var(--bg-secondary);}
.ip-cp-mode-opt i{margin-left:auto;font-size:14px;color:var(--text-brand);}
.ip-cp-divider{height:1px;background:var(--border-secondary);margin:0 -12px;}
.ip-cp-actions{display:flex;gap:8px;}
/* Cancel/Apply match the design-system Button (sm) */
.ip-cp-cancel,.ip-cp-apply{flex:1;height:24px;padding:2px 6px;border-radius:var(--radius-lg);border:1px solid transparent;font-size:12px;font-weight:500;line-height:16px;cursor:pointer;box-shadow:var(--shadow-xs);}
.ip-cp-cancel{background:var(--bg-primary);border-color:var(--border-secondary);color:var(--text-primary);}
.ip-cp-cancel:hover{background:var(--bg-primary-hover);}
.ip-cp-apply{background:var(--brand-text);color:var(--text-on-brand);}
.ip-cp-apply:hover{filter:brightness(.95);}
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;background:var(--bg-primary);}
.board{display:flex;gap:16px;padding:20px;height:100%;align-items:flex-start;min-width:min-content;}
.column{
  width:320px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%;
  background:var(--bg-secondary-subtle);
  border-radius:var(--radius-xl);
}
.col-head{display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin:8px 6px 0;padding:6px;border-radius:var(--radius-lg);}
.col-head:hover{background:var(--bg-primary-hover);}
.col-title-wrap{display:inline-flex;align-items:center;gap:6px;min-width:0;flex:1;cursor:pointer;}
.col-title{font-size:14px;font-weight:600;line-height:20px;color:var(--text-primary);}
/* inline rename (active state) */
.col-rename{display:flex;width:100%;}
.col-rename-input{flex:1;min-width:0;height:32px;padding:6px 12px;border:1px solid var(--brand-text);
  border-radius:var(--radius-lg) 0 0 var(--radius-lg);outline:none;font-size:14px;color:var(--text-primary);
  background:var(--bg-primary);box-shadow:0 0 0 2px var(--focus-ring);}
.col-rename-save{height:32px;padding:6px 14px;background:var(--brand-text);color:var(--text-on-brand);font-size:14px;font-weight:500;
  border:none;border-radius:0 var(--radius-lg) var(--radius-lg) 0;cursor:pointer;box-shadow:var(--shadow-xs);}
.col-count{
  font-size:12px;font-weight:500;color:var(--text-secondary);background:var(--bg-secondary);
  border-radius:var(--radius-sm);padding:2px 7px;display:flex;align-items:center;justify-content:center;
}
.col-actionrow{display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.col-ctx-menu{position:absolute;top:calc(100% + 4px);right:0;z-index:100;width:240px;
  background:var(--bg-primary);border:1px solid var(--border-secondary);
  border-radius:var(--radius-xl);padding:4px 0;
  box-shadow:var(--shadow-lg);}
.col-ctx-item{display:flex;align-items:center;padding:2px 6px;}
.col-ctx-wrap{display:flex;flex:1;align-items:flex-start;gap:4px;padding:6px;border-radius:var(--radius-lg);cursor:pointer;}
.col-ctx-icon{margin-top:2px;}
.col-ctx-wrap:hover{background:var(--bg-primary-hover);}
.col-ctx-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.col-ctx-icon i{font-size:14px;color:var(--text-secondary);}
.col-ctx-label{font-size:14px;color:var(--text-primary);flex:1;}
.col-ctx-chev{display:flex;align-items:center;justify-content:center;width:16px;height:16px;}
.col-ctx-chev i{font-size:14px;color:var(--text-secondary);}
.col-ctx-divider{height:1px;background:var(--border-secondary);margin:4px 0;}
.col-meta{font-size:12px;color:var(--text-secondary);white-space:nowrap;opacity:0;transition:opacity .12s;}
.column:hover .col-meta{opacity:1;}
.col-more{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-xs);
  color:var(--text-tertiary);background:none;border:none;cursor:pointer;}
.col-more:hover{background:var(--bg-tertiary);color:var(--text-primary);}
.col-more i{font-size:16px;}
.col-body{flex:1;overflow-y:auto;padding:8px 12px 0;display:flex;flex-direction:column;gap:8px;}
.col-body::-webkit-scrollbar{width:16px;}
.col-body::-webkit-scrollbar-track{background:transparent;}
.col-body::-webkit-scrollbar-thumb{background:var(--border-primary);border-radius:999px;border:6px solid transparent;background-clip:content-box;}
.col-body::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary);background-clip:content-box;}
.col-body.drag-over{background:var(--brand-bg);border-radius:var(--radius-lg);}
.col-foot{padding:8px 12px 14px;}
.add-card{
  display:flex;align-items:center;gap:6px;width:100%;padding:8px;border-radius:var(--radius-lg);
  color:var(--text-tertiary);font-size:14px;font-weight:500;
}
.add-card:hover{background:var(--bg-primary-hover);color:var(--text-secondary);}
.add-card i{font-size:16px;}

/* ---------- Ticket card ---------- */
.ticket{
  position:relative;
  background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:var(--radius-xl);
  box-shadow:var(--shadow-xs);overflow:hidden;cursor:pointer;transition:box-shadow .12s,border-color .12s;
  flex-shrink:0;
}
.ticket:hover{box-shadow:var(--shadow-md);border-color:var(--border-primary);}
.ticket.dragging{opacity:.4;}
/* hover action group (top-right) */
.tk-actions{position:absolute;top:12px;right:12px;display:flex;opacity:0;transition:opacity .12s;z-index:2;}
.ticket:hover .tk-actions{opacity:1;}
.tk-act{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  color:var(--text-tertiary);background:var(--bg-primary);border:1px solid var(--border-secondary);cursor:pointer;position:relative;}
.tk-act:first-child{border-radius:var(--radius-lg) 0 0 var(--radius-lg);}
.tk-act:last-child{border-radius:0 var(--radius-lg) var(--radius-lg) 0;}
.tk-act+.tk-act{border-left:none;}
.tk-act:hover{background:var(--bg-primary-hover);color:var(--text-primary);}
.tk-act.active{background:var(--bg-primary);border:1px solid var(--border-brand);box-shadow:0 0 0 2px var(--focus-ring);color:var(--text-primary);z-index:1;outline:none;}
.tk-act i{font-size:16px;}
/* card context menu */
.card-menu{width:240px;max-height:384px;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:12px;padding:4px 0;overflow:hidden;box-shadow:var(--shadow-lg);}
.menu-item{width:100%;padding:2px 6px;display:flex;align-items:center;cursor:pointer;}
.menu-item-inner{width:100%;padding:6px;border-radius:10px;display:flex;align-items:center;gap:4px;}
.menu-item:hover .menu-item-inner{background:var(--bg-secondary);}
.menu-item-label{font-size:14px;font-weight:400;line-height:20px;color:var(--text-primary);flex:1;}
.menu-item-label.destructive{color:var(--text-error);}
.menu-item i{font-size:16px;color:var(--text-secondary);flex-shrink:0;}
.menu-item .destructive-icon{color:var(--text-error);}
.menu-item-chevron{font-size:16px;color:var(--text-tertiary);margin-left:auto;flex-shrink:0;}
.menu-item-shortcut{margin-left:auto;font-size:12px;color:var(--text-quaternary);flex-shrink:0;}
.menu-divider{width:100%;height:1px;background:var(--border-secondary);margin:4px 0;}
.tk-cover{height:120px;background-size:cover;background-position:center;border-bottom:1px solid var(--border-secondary);}
.tk-body{display:flex;flex-direction:column;gap:12px;padding:16px;}
.tk-text{display:flex;flex-direction:column;gap:2px;}
.tk-code{font-size:12px;line-height:18px;color:var(--text-quaternary);}
.tk-title{font-size:14px;line-height:20px;font-weight:500;color:var(--text-primary);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.tk-props{display:flex;flex-wrap:wrap;gap:8px;}
.prop{
  display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:var(--radius-sm);
  border:1px solid var(--border-secondary);background:var(--bg-primary);
  font-size:12px;line-height:16px;font-weight:500;color:var(--text-secondary);white-space:nowrap;
}
.prop i{font-size:14px;color:var(--text-tertiary);}
.prop.warn{border-color:transparent;background:var(--warning-bg);color:var(--warning-text);}
.prop.warn i{color:var(--warning-text);}
.tk-assignees{display:flex;align-items:center;gap:8px;}
.tags{display:flex;flex-wrap:wrap;gap:8px;}
.tag{
  display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:var(--radius-sm);
  font-size:12px;line-height:16px;font-weight:500;
}
.tag.compact{gap:0;padding:4px;}
.tag-dot{width:6px;height:6px;border-radius:999px;background:currentColor;flex-shrink:0;}
.tk-details{display:flex;gap:12px;align-items:center;}
.tk-details .d{display:flex;align-items:center;gap:4px;color:var(--text-secondary);font-size:12px;line-height:18px;}
.tk-details .d i{font-size:14px;color:var(--text-tertiary);}

/* footer */
.footer{
  height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  border-top:1px solid var(--border-secondary);
}
.footer .summary{color:var(--text-tertiary);font-size:14px;font-weight:500;letter-spacing:-.1px;}

/* ---------- Generic placeholder views ---------- */
.view-pad{flex:1;overflow:auto;background:var(--bg-canvas);padding:24px;}
.panel{background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:var(--radius-xl);padding:20px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px;}
.stat{background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:var(--radius-xl);padding:16px 18px;}
.stat .n{font-size:28px;font-weight:600;color:var(--text-primary);}
.stat .l{font-size:12px;color:var(--text-tertiary);margin-top:4px;}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.bar-row .lab{width:110px;font-size:13px;color:var(--text-secondary);}
.bar-track{flex:1;height:10px;background:var(--bg-secondary);border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;}
.bar-row .v{width:36px;text-align:right;font-size:13px;color:var(--text-secondary);font-weight:500;}

/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border-secondary);border:1px solid var(--border-secondary);border-radius:var(--radius-xl);overflow:hidden;}
.cal-h{background:var(--bg-secondary-subtle);padding:8px;font-size:12px;font-weight:600;color:var(--text-tertiary);text-align:center;}
.cal-d{background:var(--bg-primary);min-height:96px;padding:6px;display:flex;flex-direction:column;gap:4px;}
.cal-d .dn{font-size:12px;color:var(--text-tertiary);}
.cal-d.muted{background:var(--bg-secondary-subtle);}
.cal-chip{font-size:11px;font-weight:500;padding:2px 6px;border-radius:var(--radius-xs);background:var(--brand-bg);color:var(--brand-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* delivered list */
.dlist{display:flex;flex-direction:column;gap:8px;}
.drow{display:flex;align-items:center;gap:12px;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:var(--radius-lg);padding:12px 16px;}
.drow i.chk{color:var(--success-text);font-size:18px;}
.drow .code{font-size:12px;color:var(--text-quaternary);width:72px;flex-shrink:0;}
.drow .t{flex:1;font-size:14px;font-weight:500;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ---------- card detail modal ---------- */
.overlay{position:fixed;inset:0;background:var(--bg-scrim);display:flex;align-items:flex-start;justify-content:center;padding:48px 16px;z-index:50;overflow:auto;}
.modal{width:640px;max-width:100%;background:var(--bg-primary);border-radius:var(--radius-xl);box-shadow:var(--shadow-md);overflow:hidden;}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 20px 0;}
.modal-body{padding:16px 20px 24px;display:flex;flex-direction:column;gap:16px;}
.modal h2{font-size:18px;font-weight:600;line-height:26px;color:var(--text-primary);padding:0 20px;}
.section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary);margin-bottom:8px;}
.kv{display:flex;gap:8px;flex-wrap:wrap;}
.desc{font-size:14px;line-height:22px;color:var(--text-secondary);}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);gap:8px;}
.empty i{font-size:40px;opacity:.5;}

/* ============================ Workspace Backlog ============================ */
.backlog-page{display:flex;flex-direction:column;height:100%;overflow:hidden;background:var(--bg-primary);position:relative;}
.bl-hdr{height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border-secondary);}
.bl-hdr-left{display:flex;align-items:center;gap:4px;}
.bl-hdr-title{display:flex;align-items:center;gap:4px;height:32px;padding:6px 8px;border-radius:var(--radius-lg);}
.bl-hdr-title i{font-size:16px;color:var(--text-tertiary);}
.bl-hdr-title span{padding:0 4px;font-size:14px;font-weight:500;color:var(--text-primary);}
.bl-hdr-right{display:flex;align-items:center;gap:4px;}
.bl-toolbar{height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border-secondary);}
.bl-toolbar-right{display:flex;align-items:center;gap:16px;}
.bl-avgroup{display:flex;align-items:center;gap:8px;}
.bl-avstack{display:flex;align-items:center;}
.bl-sort-btn{display:flex;align-items:center;height:32px;padding:0 8px;border:1px solid var(--border-secondary);border-radius:var(--radius-lg);cursor:pointer;}
.bl-sort-btn:hover{background:var(--bg-primary-hover);}
.bl-sort-btn.active{border-color:var(--border-brand);box-shadow:0 0 0 2px var(--focus-ring);outline:none;}
.bl-sort-btn.active i.ri-arrow-down-s-line{transform:rotate(180deg);}
.bl-sort-btn i{font-size:16px;color:var(--text-secondary);transition:transform .15s ease;}
/* body: flex column, pads table 20px from edges; table-wrap is the scroll container */
.bl-body{display:flex;flex-direction:column;padding:24px 20px 0;overflow:hidden;}
.bl-table-wrap{flex:1;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;}
.bl-table-wrap::-webkit-scrollbar{display:none;}
/* custom horizontal scrollbar — 16px gap below table, thumb 4px tall */
.bl-scrollbar-track{margin-top:16px;height:16px;position:relative;flex-shrink:0;}
.bl-scrollbar-thumb{position:absolute;top:6px;height:4px;border-radius:2px;background:var(--border-secondary);cursor:pointer;transition:background .12s;}
.bl-scrollbar-thumb:hover,.bl-scrollbar-thumb:active{background:var(--border-primary);}
/* table: fixed layout respects col widths; total 2300px */
.bl-table{border-collapse:collapse;table-layout:fixed;width:2396px;}
.bl-table th,.bl-table td{padding:0 12px;border-bottom:1px solid var(--border-secondary);white-space:nowrap;vertical-align:middle;box-sizing:border-box;}
.bl-table th{background:var(--bg-secondary-subtle);font-size:14px;font-weight:400;color:var(--text-secondary);text-align:left;height:36px;}
.bl-table td{background:var(--bg-primary);height:36px;font-size:14px;color:var(--text-primary);}
.bl-table tbody tr:hover td{background:var(--bg-primary-hover);}
/* column widths (44+96+480+240+128+240+128+96+96+108+96+120+480+44=2396) */
.bl-col-check{width:44px;}
.bl-col-id{width:96px;}
.bl-col-ticket{width:480px;}
.bl-col-project{width:240px;}
.bl-col-status{width:128px;}
.bl-col-due{width:240px;}
.bl-col-members{width:128px;}
.bl-col-est{width:96px;}
.bl-col-tasks{width:96px;}
.bl-col-attach{width:108px;}
.bl-col-cmt{width:96px;}
.bl-col-logged{width:120px;}
.bl-col-tags{width:480px;}
.bl-col-act{width:44px;}
/* sticky columns */
.bl-sticky-check{position:sticky;left:0;z-index:1;}
.bl-sticky-id{position:sticky;left:44px;z-index:1;}
.bl-sticky-ticket{position:sticky;left:140px;z-index:1;border-right:1px solid transparent;}
.bl-table.bl-noid .bl-sticky-ticket{left:44px;}
/* column resize handle */
.bl-th-resizable{position:relative;}
.bl-col-resize{position:absolute;top:0;right:0;width:8px;height:100%;cursor:col-resize;user-select:none;z-index:2;}
.bl-col-resize:hover{box-shadow:inset -2px 0 0 var(--border-brand);}
.bl-sticky-act{position:sticky;right:0;z-index:1;border-left:1px solid transparent;}
.bl-has-left .bl-sticky-ticket{border-right-color:var(--border-secondary);}
.bl-has-right .bl-sticky-act{border-left-color:var(--border-secondary);}
.bl-table thead .bl-sticky-check,
.bl-table thead .bl-sticky-id,
.bl-table thead .bl-sticky-ticket,
.bl-table thead .bl-sticky-act{z-index:3;}
/* sticky td backgrounds (must be explicit to cover cells behind) */
.bl-table tbody tr td.bl-sticky-check,
.bl-table tbody tr td.bl-sticky-id,
.bl-table tbody tr td.bl-sticky-ticket{background:var(--bg-primary);}
.bl-table tbody tr td.bl-sticky-act{background:var(--bg-primary);}
.bl-table tbody tr:hover td.bl-sticky-check,
.bl-table tbody tr:hover td.bl-sticky-id,
.bl-table tbody tr:hover td.bl-sticky-ticket,

/* ============================ Atoms ============================ */
function Avatar({ data, size=20 }){
  const style = { width:size, height:size, fontSize:size>=28?14:10, lineHeight:(size)+"px" };
  if(!data) return null;
  if(data.type==="img"){
    return <div className="av" style={{...style, backgroundImage:`url(${data.src})`}} />;
  }
  const c = data.color || "brand";
  return <div className="av" style={{...style, background:`var(--${c}-bg)`, color:`var(--${c}-text)`}}>{data.initials}</div>;
}

function Tag({ data, full=true }){
  if(!data) return null;
  return (
    <span className={"tag"+(full?"":" compact")} title={full?undefined:data.label}
      style={{ background:`var(--${data.color}-bg)`, color:`var(--${data.color}-text)` }}>
      <span className="tag-dot"></span>{full && data.label}
    </span>
  );
}

function SbLabel({ children, active, collapsed, onToggle }){
  return (
    <div className={"sb-label"+(active&&collapsed?" active":"")}>

        <span className="sb-label-head" onClick={onToggle}>
          <span className="sb-label-text">{children}</span>
          <i className={"ri-arrow-down-s-line sb-label-chev"+(collapsed?" collapsed":"")}></i>
        </span>
        <span className="sb-label-actions" onClick={e=>e.stopPropagation()}>
          <button className="sb-label-act" title="More"><i className="ri-more-line"></i></button>
          <button className="sb-label-act" title="Add"><i className="ri-add-line"></i></button>
        </span>
      </div>
    </div>
  );
}

    { id:"fav-ecom",   icon:"ri-stack-line",         prefix:"Dev-eCom", label:"eCommerce platform" },
  ]);

  const sbDragRef   = useRef(null);
  const [sbDragOver,setSbDragOver]   = useState(null);
  const [sbDragging,setSbDragging]   = useState(null);

  const sbStart = (sec,id)=>{ sbDragRef.current={sec,id}; setSbDragging({sec,id}); };
  const sbEnd   = ()=>{ sbDragRef.current=null; setSbDragging(null); setSbDragOver(null); };
  const sbDrop  = (sec,id)=>{
    const from=sbDragRef.current;
    if(!from||from.sec!==sec||from.id===id){ sbEnd(); return; }
    const reord=(arr,getId)=>{
      const fi=arr.findIndex(x=>getId(x)===from.id), ti=arr.findIndex(x=>getId(x)===id);
      if(fi<0||ti<0) return arr;
      const n=[...arr]; const [item]=n.splice(fi,1); n.splice(ti,0,item); return n;
    };
    if(sec==='fav')      setFavs(a=>reord(a,x=>x.id));
    if(sec==='boards')   setBoards(a=>reord(a,x=>x.id));
    if(sec==='projects') setProjects(a=>reord(a,x=>x.id));
    sbEnd();
  };

  const rowCls=(sec,id,extra='')=>
    'sb-row'+extra+
    (sbDragging&&sbDragging.sec===sec&&sbDragging.id===id?' sb-dragging':'');

    draggable:true,
    onDragStart:e=>{ e.stopPropagation(); sbStart(sec,id); },
    onDragEnd:sbEnd,
