mark{background:#faeeda;color:#633806;border-radius:2px;padding:0 1px;}
input,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px;}
.snav{padding:5px 8px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:13px;color:#374151;user-select:none;}
.snav:hover{background:#f3f4f6;}
.snav.active{background:#EEEDFE;color:#3C3489;font-weight:500;}
.btab{padding:5px 10px;border-radius:6px;font-size:13px;border:none;cursor:pointer;background:transparent;color:#6b7280;white-space:nowrap;}
.btab:hover{color:#111827;}
.btab.active{background:#fff;color:#111827;font-weight:500;border:0.5px solid #e5e7eb;}
.card-w{background:#fff;border:0.5px solid #e5e7eb;border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;transition:box-shadow .12s;}
.card-w:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);}
.add-btn{display:flex;align-items:center;gap:6px;padding:7px 6px;border-radius:6px;cursor:pointer;font-size:12px;color:#9ca3af;background:transparent;border:none;width:100%;}
.add-btn:hover{background:rgba(0,0,0,.04);color:#6b7280;}
.opt-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;margin:0 4px;cursor:pointer;transition:background .1s;}
.opt-row:hover{background:#f5f5f5;}
.opt-row.sel{background:#eff6ff;}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;border-left:2px solid transparent;transition:background .1s;}
.cat-row:hover{background:#f9fafb;}
.cat-row.active{background:#eff6ff;border-left-color:#2563eb;}
.preset-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;cursor:pointer;border-left:2px solid transparent;border-radius:0;transition:background .1s;}
.preset-row:hover{background:#f9fafb;}
.preset-row.active{background:#EEEDFE;border-left-color:#7C3AED;}
.icon-btn{background:none;border:none;cursor:pointer;border-radius:6px;padding:4px;display:flex;align-items:center;justify-content:center;color:#6b7280;}
.icon-btn:hover{background:#f3f4f6;color:#374151;}
.sort-opt{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;cursor:pointer;font-size:13px;color:#374151;border-radius:6px;margin:0 4px;}
.sort-opt:hover{background:#f5f5f5;}
.sort-opt.active{background:#eff6ff;color:#2563eb;font-weight:500;}
input[type="date"]{border:0.5px solid #e5e7eb;border-radius:6px;padding:5px 8px;font-size:12px;color:#374151;background:#fff;outline:none;width:100%;cursor:pointer;}
input[type="date"]:focus{border-color:#93c5fd;}
.dark-toggle{width:36px;height:20px;background:#e5e7eb;border-radius:10px;position:relative;cursor:pointer;}
.dark-toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;}
.tb-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:0.5px solid #e5e7eb;border-radius:7px;background:#fff;font-size:12px;font-weight:500;color:#374151;cursor:pointer;white-space:nowrap;}
.tb-btn:hover{background:#f9fafb;}
.tb-btn.on{border-color:#93c5fd;background:#eff6ff;color:#2563eb;}

/* ── DateRangePicker ──────────────────────────────────────────────────── */
function DateRangePicker({onApply,onCancel}){
  const today=new Date(); today.setHours(0,0,0,0);
  const[viewY,setViewY]=useState(today.getFullYear());
  const[viewM,setViewM]=useState(today.getMonth());
  const[startD,setStartD]=useState(null);
  const[endD,setEndD]=useState(null);
  const[hoverD,setHoverD]=useState(null);
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DNAMES=['S','M','T','W','T','F','S'];
  function prevM(){if(viewM===0){setViewM(11);setViewY(y=>y-1);}else setViewM(m=>m-1);}
  function nextM(){if(viewM===11){setViewM(0);setViewY(y=>y+1);}else setViewM(m=>m+1);}
  function sameDay(a,b){if(!a||!b)return false;return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
  function dispDate(d){if(!d)return'mm/dd/yyyy';return`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}`;}
  function labelDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
  function handleClick(date){
    if(!startD||(startD&&endD)){setStartD(new Date(date));setEndD(null);setHoverD(null);}
    else{if(date.getTime()<startD.getTime()){setEndD(new Date(startD));setStartD(new Date(date));}else if(sameDay(date,startD)){setStartD(null);}else setEndD(new Date(date));}
  }
  const effEnd=!endD&&startD&&hoverD?hoverD:endD;
  const rMin=startD&&effEnd?(startD<=effEnd?startD:effEnd):startD;
  const rMax=startD&&effEnd?(startD<=effEnd?effEnd:startD):null;
  function inRange(d){if(!rMin||!rMax)return false;return d>rMin&&d<rMax;}
  const daysInM=new Date(viewY,viewM+1,0).getDate();
  const firstDow=new Date(viewY,viewM,1).getDay();
  const prevDays=new Date(viewY,viewM,0).getDate();
  const cells=[];
  for(let i=firstDow-1;i>=0;i--)cells.push({date:new Date(viewY,viewM-1,prevDays-i),curr:false});
  for(let i=1;i<=daysInM;i++)cells.push({date:new Date(viewY,viewM,i),curr:true});
  while(cells.length<42)cells.push({date:new Date(viewY,viewM+1,cells.length-firstDow-daysInM+1),curr:false});
  const canApply=startD&&endD;
  return(
    <div style={{padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <span style={{fontSize:15,fontWeight:600,color:"#111827"}}>{MONTHS[viewM]} {viewY}</span>
        <div style={{display:"flex",gap:4}}>
          <button onClick={prevM} style={{background:"none",border:"0.5px solid #e5e7eb",borderRadius:6,padding:"3px 7px",cursor:"pointer",display:"flex",alignItems:"center"}}><Ico n="ch-l" s={13} c="#374151"/></button>
          <button onClick={nextM} style={{background:"none",border:"0.5px solid #e5e7eb",borderRadius:6,padding:"3px 7px",cursor:"pointer",display:"flex",alignItems:"center"}}><Ico n="ch-r" s={13} c="#374151"/></button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[{label:"Start",val:startD},{label:"End",val:endD}].map(({label,val})=>(
          <div key={label}>
            <div style={{fontSize:12,fontWeight:500,color:"#374151",marginBottom:4}}>{label}</div>
            <div style={{border:`1px solid ${val?"#2563eb":"#e5e7eb"}`,borderRadius:8,padding:"6px 10px",fontSize:12,color:val?"#111827":"#9ca3af",background:"#fff",fontFamily:"monospace"}}>{dispDate(val)}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:2}}>
        {DNAMES.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:11,fontWeight:500,color:"#9ca3af",padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
        {cells.map(({date,curr},idx)=>{
          const isSt=sameDay(date,rMin);
          const isEn=rMax&&sameDay(date,rMax);
          const isMid=inRange(date);
          const isTdy=sameDay(date,today);
          const col=idx%7;
          return(
            <div key={idx} style={{position:"relative",height:36,display:"flex",alignItems:"center",justifyContent:"center"}}
              onMouseEnter={()=>{if(startD&&!endD)setHoverD(date);}}
              onMouseLeave={()=>setHoverD(null)}>
              {isSt&&rMax&&!sameDay(rMin,rMax)&&<div style={{position:"absolute",top:4,bottom:4,left:"50%",right:col===6?"4px":"0",background:"#EFF6FF"}}/>}
              {isEn&&rMin&&!sameDay(rMin,rMax)&&<div style={{position:"absolute",top:4,bottom:4,left:col===0?"4px":"0",right:"50%",background:"#EFF6FF"}}/>}
              {isMid&&<div style={{position:"absolute",top:4,bottom:4,left:col===0?"4px":"0",right:col===6?"4px":"0",background:"#EFF6FF"}}/>}
              <div onClick={()=>handleClick(date)}
                style={{position:"relative",zIndex:1,width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",userSelect:"none",fontSize:12,fontWeight:isSt||isEn?600:400,background:isSt||isEn?"#2563eb":"transparent",color:isSt||isEn?"#fff":!curr?"#d1d5db":"#111827",border:isTdy&&!isSt&&!isEn?"1.5px solid #2563eb":"none"}}>
                {date.getDate()}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}}>
        <button onClick={onCancel} style={{padding:"8px 0",border:"0.5px solid #e5e7eb",borderRadius:8,background:"#fff",color:"#374151",fontSize:13,fontWeight:500,cursor:"pointer"}}>Cancel</button>
        <button onClick={()=>canApply&&onApply(`${labelDate(startD)} – ${labelDate(endD)}`)}
          style={{padding:"8px 0",border:"none",borderRadius:8,background:canApply?"#2563eb":"#e5e7eb",color:canApply?"#fff":"#9ca3af",fontSize:13,fontWeight:500,cursor:canApply?"pointer":"default"}}>Apply</button>
      </div>
    </div>
  );
}

/* ── globalSearch + HiText ────────────────────────────────────────────── */
function globalSearch(q){
  if(!q.trim())return{};
  const ql=q.toLowerCase();
  const res={};
  const cats={Members:{options:MEMBERS,type:"member"},Tags:{options:TAGS,type:"badge"},"Due date":{options:DATE_PRESETS,type:"badge"}};
  Object.entries(cats).forEach(([cat,data])=>{
    const m=data.options.filter(o=>o.label.toLowerCase().includes(ql)||cat.toLowerCase().includes(ql));
    if(m.length)res[cat]={matches:m,type:data.type};
  });
  return res;
}
function HiText({text,q}){
  if(!q)return<>{text}</>;
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return<>{text}</>;
  return<>{text.slice(0,i)}<mark>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
}

/* ── FilterDropdown ───────────────────────────────────────────────────── */
function FilterDropdown({filters,onToggle,onApplyCustom,onClearAll,
  search,setSearch,activeCat,setActiveCat,
  presets,onSavePreset,onLoadPreset,onDeletePreset,
  pos,ddRef}){
  const[showCalendar,setShowCalendar]=useState(false);
  const[savingName,setSavingName]=useState(false);
  const[presetName,setPresetName]=useState("");
  const[hovPreset,setHovPreset]=useState(null);
  const inputRef=useRef(null);
  const nameRef=useRef(null);
  useEffect(()=>{if(!showCalendar)setTimeout(()=>inputRef.current?.focus(),30);},[showCalendar]);
  useEffect(()=>{if(savingName)setTimeout(()=>nameRef.current?.focus(),30);},[savingName]);
  const isS=search.trim().length>0;
  const sr=isS?globalSearch(search):{};
  const hasR=Object.keys(sr).length>0;
  const cats={Members:{options:MEMBERS,type:"member"},Tags:{options:TAGS,type:"badge"},"Due date":{options:DATE_PRESETS,type:"badge"}};
  const catCounts={};
  Object.keys(cats).forEach(c=>{catCounts[c]=Object.values(filters).filter(f=>f.category===c).length;});
  const fc=Object.keys(filters).length;

  function renderOpt(opt,cat,type,query){
    const sel=!!filters[opt.id];
    return(
      <div key={opt.id} className={`opt-row${sel?" sel":""}`} onClick={()=>onToggle(cat,opt)}>
        <div style={{width:14,height:14,borderRadius:3,flexShrink:0,border:sel?"none":"1px solid #d1d5db",background:sel?"#2563eb":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {sel&&<Ico n="check" s={10} c="#fff"/>}
        </div>
        {type==="member"&&(
          <div style={{width:22,height:22,borderRadius:"50%",background:opt.bg,color:opt.fg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:500,flexShrink:0}}>{opt.initials}</div>
        )}
        {type==="badge"
          ?<span style={{fontSize:12,fontWeight:500,padding:"2px 7px",borderRadius:5,background:opt.bg,color:opt.fg}}><HiText text={opt.label} q={query}/></span>
          :<span style={{fontSize:13,color:"#111827"}}><HiText text={opt.label} q={query}/></span>
        }
      </div>
    );
  }

  return(
    <div ref={ddRef} style={{position:"fixed",top:pos.top,left:pos.left,width:458,
      background:"#fff",borderRadius:12,border:"0.5px solid #e5e7eb",
      boxShadow:"0 8px 24px -4px rgba(0,0,0,.10),0 0 0 0.5px rgba(0,0,0,.04)",
      zIndex:1000,overflow:"hidden"}}>

      {showCalendar?(
        <DateRangePicker
          onApply={label=>{onApplyCustom(label);setShowCalendar(false);}}
          onCancel={()=>setShowCalendar(false)}/>
      ):(
        <>
          {/* Search */}
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderBottom:"0.5px solid #f3f4f6",background:"#fff"}}>
            <Ico n="search" s={14} c={isS?"#2563eb":"#9ca3af"}/>
            <input ref={inputRef} type="text" placeholder="Search across all filters..."
              value={search} onChange={e=>setSearch(e.target.value)}
              onKeyDown={e=>{if(e.key==="Escape"&&search)setSearch("");}}
              style={{flex:1,border:"none",outline:"none",fontSize:13,background:"transparent",color:"#111827"}}/>
            {isS&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",padding:0,color:"#9ca3af",display:"flex"}}><Ico n="x" s={13} c="#9ca3af"/></button>}
          </div>

          {isS?(
            <div style={{maxHeight:340,overflowY:"auto",padding:"6px 0",background:"#fff"}}>
              {hasR?Object.entries(sr).map(([cat,{matches,type}])=>(
                <div key={cat} style={{marginBottom:4}}>
                  <div style={{padding:"5px 12px 3px",fontSize:10.5,fontWeight:500,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em",display:"flex",alignItems:"center",gap:5}}>
                    {cat}<span style={{background:"#f3f4f6",color:"#9ca3af",borderRadius:8,padding:"0 5px",fontSize:10}}>{matches.length}</span>
                  </div>
                  {matches.map(opt=>renderOpt(opt,cat,type,search))}
                </div>
              )):(
                <div style={{padding:"36px 16px",textAlign:"center"}}>
                  <Ico n="no-srch" s={32} c="#d1d5db"/>
                  <div style={{fontSize:13,color:"#374151",fontWeight:500,marginTop:8,marginBottom:4}}>No results found</div>
                  <div style={{fontSize:12,color:"#9ca3af"}}>No filters match "{search}"</div>
                </div>
              )}
            </div>
          ):(
            <div style={{display:"flex",height:320}}>
              {/* Left sidebar — categories only */}
              <div style={{width:160,borderRight:"0.5px solid #f3f4f6",padding:"6px 0",overflowY:"auto",flexShrink:0,background:"#fff"}}>

                {/* Categories */}
                {Object.keys(cats).map(cat=>{
                  const count=catCounts[cat];
                  const isA=activeCat===cat;
                  return(
                    <div key={cat} className={`cat-row${isA?" active":""}`} onClick={()=>setActiveCat(cat)}>
                      <span style={{fontSize:13,fontWeight:isA?500:400,color:isA?"#2563eb":"#111827"}}>{cat}</span>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        {count>0&&<span style={{background:"#2563eb",color:"#fff",borderRadius:9,padding:"0 5px",fontSize:10,fontWeight:500,lineHeight:"15px"}}>{count}</span>}
                        <Ico n="ch-r" s={11} c="#9ca3af"/>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Options panel */}
              <div style={{flex:1,padding:"6px 0",overflowY:"auto",background:"#fff"}}>
                {activeCat&&(
                  <>
                    <div style={{padding:"4px 12px 5px",fontSize:10.5,fontWeight:500,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em"}}>
                      {activeCat==="Due date"?`${cats[activeCat].options.length} presets`:`${cats[activeCat].options.length} options`}
                    </div>
                    {cats[activeCat].options.map(opt=>renderOpt(opt,activeCat,cats[activeCat].type,""))}
                    {activeCat==="Due date"&&(
                      <div className="opt-row" style={{margin:"0 4px"}} onClick={()=>setShowCalendar(true)}>
                        <div style={{width:14,height:14,borderRadius:3,border:"1px solid #d1d5db",background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {!!filters["custom-date"]&&<Ico n="check" s={10} c="#2563eb"/>}
                        </div>
                        <span style={{fontSize:13,color:"#374151",flex:1}}>Custom range...</span>
                        <Ico n="ch-r" s={12} c="#9ca3af"/>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          )}

          {/* Footer */}
          <div style={{padding:"8px 12px",borderTop:"0.5px solid #f3f4f6",background:"#f9fafb"}}>
            {savingName?(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input ref={nameRef} type="text" placeholder="Name this preset..."
                  value={presetName} onChange={e=>setPresetName(e.target.value)}
                  onKeyDown={e=>{
                    if(e.key==="Enter"&&presetName.trim()){onSavePreset(presetName.trim());setSavingName(false);setPresetName("");}
                    if(e.key==="Escape"){setSavingName(false);setPresetName("");}
                  }}
                  style={{flex:1,border:"0.5px solid #7C3AED",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none",color:"#111827"}}/>
                <button onClick={()=>{setSavingName(false);setPresetName("");}}
                  style={{padding:"5px 8px",border:"0.5px solid #e5e7eb",borderRadius:6,background:"#fff",color:"#374151",fontSize:12,cursor:"pointer"}}>Cancel</button>
                <button onClick={()=>{if(presetName.trim()){onSavePreset(presetName.trim());setSavingName(false);setPresetName("");}}}
                  disabled={!presetName.trim()}
                  style={{padding:"5px 10px",border:"none",borderRadius:6,background:presetName.trim()?"#7C3AED":"#e5e7eb",color:presetName.trim()?"#fff":"#9ca3af",fontSize:12,fontWeight:500,cursor:presetName.trim()?"pointer":"default"}}>Save</button>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:11,color:"#9ca3af"}}>
                  {fc>0?`${fc} filter${fc>1?"s":""} applied`:"No filters applied"}
                </span>
                <div style={{display:"flex",gap:6}}>
                  {fc>0&&(
                    <button onClick={onClearAll}
                      style={{padding:"4px 10px",border:"0.5px solid #e5e7eb",borderRadius:6,background:"#fff",color:"#374151",fontSize:12,fontWeight:500,cursor:"pointer"}}>
                      Clear all
                    </button>
                  )}
                  {fc>0&&(
                    <button onClick={()=>setSavingName(true)}
                      style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",border:"0.5px solid #7C3AED",borderRadius:6,background:"#EEEDFE",color:"#3C3489",fontSize:12,fontWeight:500,cursor:"pointer"}}>
                      <Ico n="bookmark" s={12} c="#7C3AED"/>Save preset
                    </button>
                  )}
                </div>
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

/* ── Sort Dropdown ────────────────────────────────────────────────────── */
function SortDropdown({pos,panelRef,sortBy,sortDir,onSort,onDir}){
  return(
    <div ref={panelRef} style={{position:"fixed",top:pos.top,left:pos.left,
      width:230,background:"#fff",borderRadius:10,border:"0.5px solid #e5e7eb",
      boxShadow:"0 8px 24px -4px rgba(0,0,0,.10),0 0 0 0.5px rgba(0,0,0,.04)",

      <div style={{padding:"4px 12px 6px",fontSize:10.5,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em"}}>Sort by</div>
      {["None",...SORT_OPTIONS].map(opt=>{
        const isA=sortBy===opt;
        return(
          <div key={opt} className={`sort-opt${isA?" active":""}`} onClick={()=>onSort(opt==="None"||sortBy===opt?"None":opt)}>
            <span>{opt}</span>
            {isA&&<Ico n="check" s={13} c="#2563eb"/>}
          </div>
        );
      })}
      {sortBy!=="None"&&(
        <>
          <div style={{margin:"6px 8px",borderTop:"0.5px solid #f3f4f6"}}/>
          <div style={{padding:"4px 12px 6px",fontSize:10.5,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em"}}>Direction</div>
          <div style={{display:"flex",gap:6,padding:"0 8px 6px"}}>
            {["asc","desc"].map(d=>(
              <button key={d} onClick={()=>onDir(d)}
                style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:5,
                  padding:"6px 0",borderRadius:7,border:"0.5px solid #e5e7eb",cursor:"pointer",fontSize:12,fontWeight:500,
                  background:sortDir===d?"#eff6ff":"#fff",
                  color:sortDir===d?"#2563eb":"#374151",
                  borderColor:sortDir===d?"#93c5fd":"#e5e7eb"}}>
                <Ico n={d==="asc"?"ch-u":"ch-d"} s={12} c={sortDir===d?"#2563eb":"#374151"}/>
                {d==="asc"?"Ascending":"Descending"}
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

        )}
      </div>
      <div style={{borderTop:"0.5px solid #f3f4f6",padding:"8px"}}>
        <div className="snav" style={{justifyContent:"space-between",marginBottom:1}}>
          <span style={{display:"flex",alignItems:"center",gap:7}}><Ico n="moon" s={14} c="#6b7280"/>Dark mode</span>
          <div className="dark-toggle"><div className="dark-toggle-knob"/></div>
        </div>
        <div className="snav" style={{marginBottom:1}}><Ico n="help" s={14} c="#6b7280"/>Help</div>
        <div className="snav"><Ico n="logout" s={14} c="#6b7280"/>Log out</div>
      </div>
    </div>
  );
}

/* ── App ──────────────────────────────────────────────────────────────── */
function App(){
  const[filterOpen,setFilterOpen]=useState(false);
  const[activeCat,setActiveCat]=useState("Members");
  const[search,setSearch]=useState("");
  const[filters,setFilters]=useState({});
  const[presets,setPresets]=useState([]);
  const[sortBy,setSortBy]=useState("None");
  const[sortDir,setSortDir]=useState("asc");
  const[groupBy,setGroupBy]=useState("Status");
  const[subGroupBy,setSubGroupBy]=useState("None");
  const[showSort,setShowSort]=useState(false);
  const[showGroup,setShowGroup]=useState(false);
  const[filterPos,setFilterPos]=useState({top:0,left:0});
  const[sortPos,setSortPos]=useState({top:0,left:0});
  const[groupPos,setGroupPos]=useState({top:0,left:0});

  const filterBtnRef=useRef(null);
  const dropdownRef=useRef(null);
  const sortBtnRef=useRef(null);
  const sortPanelRef=useRef(null);
  const groupBtnRef=useRef(null);
  const groupPanelRef=useRef(null);

  const fc=Object.keys(filters).length;
  const sortActive=sortBy!=="None";
  const groupChanged=groupBy!=="Status"||subGroupBy!=="None";

  function toggleFilter(cat,opt){
    setFilters(prev=>{
      const next={...prev};
      if(next[opt.id])delete next[opt.id];
      else next[opt.id]={...opt,category:cat};
      return next;
    });
  }
  function applyCustomDate(label){
    setFilters(prev=>({...prev,"custom-date":{id:"custom-date",label,category:"Due date",isCustom:true,bg:"#DBEAFE",fg:"#1E40AF"}}));
  }
  function clearAll(){setFilters({});}
  function savePreset(name){
    setPresets(prev=>[...prev,{id:Date.now().toString(),name,filters:{...filters}}]);
  }
  function loadPreset(pr){setFilters({...pr.filters});}
  function deletePreset(id){setPresets(prev=>prev.filter(p=>p.id!==id));}

  function openPanel(btnRef,setPos,setOpen){
    const r=btnRef.current.getBoundingClientRect();
    setPos({top:r.bottom+8,left:r.left});
    setOpen(true);
  }

  useEffect(()=>{
    function h(e){
      if(!filterBtnRef.current?.contains(e.target)&&!dropdownRef.current?.contains(e.target)){setFilterOpen(false);setSearch("");}
      if(!sortBtnRef.current?.contains(e.target)&&!sortPanelRef.current?.contains(e.target))setShowSort(false);
      if(!groupBtnRef.current?.contains(e.target)&&!groupPanelRef.current?.contains(e.target))setShowGroup(false);
    }
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  useEffect(()=>{
    function h(e){if(e.shiftKey&&e.key==="F"){e.preventDefault();setFilterOpen(p=>!p);}}
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[]);

  const topAvatars=["kp","aa","gh","vr","bo"];

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      <Sidebar presets={presets} onLoadPreset={loadPreset} onDeletePreset={deletePreset}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"#fff"}}>

        {/* Top nav */}
        <div style={{display:"flex",alignItems:"center",padding:"0 20px",height:44,borderBottom:"0.5px solid #f3f4f6",background:"#fff",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginRight:16}}>
            <Ico n="kanban" s={14} c="#7C3AED"/>
            <span style={{fontSize:13,fontWeight:500,color:"#111827"}}>Design</span>
            <Ico n="ch-d" s={12} c="#9ca3af"/>
          </div>
          <div style={{display:"flex",gap:2,flex:1}}>
            {["Board","Calendar","Board reports","Delivered from board"].map((t,i)=>(
              <button key={t} className={`btab${i===0?" active":""}`}>{t}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:2}}>
            <button className="icon-btn"><Ico n="search" s={16} c="#6b7280"/></button>
            <button className="icon-btn"><Ico n="bell" s={16} c="#6b7280"/></button>
          </div>
        </div>

        {/* Board toolbar */}
        <div style={{display:"flex",alignItems:"center",padding:"7px 20px",borderBottom:"0.5px solid #f3f4f6",background:"#fff",gap:6,flexShrink:0}}>

          {/* Filter */}
          <button ref={filterBtnRef}
            onClick={()=>{
              if(filterOpen)setFilterOpen(false);
              else{openPanel(filterBtnRef,setFilterPos,setFilterOpen);}
            }}
            className={`tb-btn${filterOpen||fc>0?" on":""}`}>
            <Ico n="filter" s={13} c={filterOpen||fc>0?"#2563eb":"#6b7280"}/>
            Filter
            {fc>0&&<span style={{background:"#2563eb",color:"#fff",borderRadius:9,padding:"0 5px",fontSize:10,fontWeight:600,lineHeight:"16px"}}>{fc}</span>}
          </button>

          {/* Sort */}
          <button ref={sortBtnRef}
            onClick={()=>{
              if(showSort)setShowSort(false);
              else{openPanel(sortBtnRef,setSortPos,setShowSort);setShowGroup(false);}
            }}
            className={`tb-btn${showSort||sortActive?" on":""}`}>
            <Ico n="sort" s={13} c={showSort||sortActive?"#2563eb":"#6b7280"}/>
            Sort
            {sortActive&&<span style={{fontSize:12,color:"#2563eb"}}>: {sortBy} {sortDir==="asc"?"↑":"↓"}</span>}
          </button>

          {/* Group */}
          <button ref={groupBtnRef}
            onClick={()=>{
              if(showGroup)setShowGroup(false);
              else{openPanel(groupBtnRef,setGroupPos,setShowGroup);setShowSort(false);}
            }}
            className={`tb-btn${showGroup||groupChanged?" on":""}`}>
            <Ico n="group" s={13} c={showGroup||groupChanged?"#2563eb":"#6b7280"}/>
            Group
            <span style={{fontSize:12,color:showGroup||groupChanged?"#2563eb":"#6b7280"}}>
              : {groupBy}{subGroupBy!=="None"?` · ${subGroupBy}`:""}
            </span>
          </button>

          {/* Right controls */}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <div style={{display:"flex"}}>
              {topAvatars.map((id,i)=>(
                <div key={id} style={{marginLeft:i>0?-8:0,zIndex:10-i}}><Av m={MM[id]} size={26}/></div>
              ))}
              <div style={{marginLeft:-8,width:26,height:26,borderRadius:"50%",background:"#f3f4f6",border:"1.5px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#6b7280",fontWeight:600}}>+5</div>
            </div>
            <button className="icon-btn" style={{borderRadius:6,border:"0.5px solid #e5e7eb",padding:"4px 5px"}}><Ico n="plus" s={14} c="#6b7280"/></button>
            <button className="icon-btn" style={{borderRadius:6,border:"0.5px solid #e5e7eb",padding:"4px 5px"}}><Ico n="distrib" s={14} c="#6b7280"/></button>
            <button className="icon-btn" style={{padding:"4px 5px"}}><Ico n="info" s={14} c="#9ca3af"/></button>
          </div>
        </div>

        {/* Board */}
        <div style={{flex:1,overflowX:"auto",overflowY:"hidden",padding:"16px 20px",display:"flex",gap:12,alignItems:"flex-start",background:"#fff"}}>
          <Column name="To do"       count={1} cards={CARDS.todo}/>
          <Column name="In progress" count={2} cards={CARDS.inprogress}/>
          <Column name="Review"      count={5} cards={CARDS.review}/>
        </div>

        <div style={{padding:"6px 20px",borderTop:"0.5px solid #f3f4f6",background:"#fff",fontSize:11,color:"#9ca3af",flexShrink:0}}>
          6 cards, 0 points
        </div>
      </div>

      {/* Floating panels — all position:fixed */}
      {filterOpen&&(
        <FilterDropdown pos={filterPos} ddRef={dropdownRef}
          filters={filters} onToggle={toggleFilter}
          onApplyCustom={applyCustomDate} onClearAll={clearAll}
          search={search} setSearch={setSearch}
          activeCat={activeCat} setActiveCat={setActiveCat}
          presets={presets} onSavePreset={savePreset}
          onLoadPreset={loadPreset} onDeletePreset={deletePreset}/>
      )}
      {showSort&&(
        <SortDropdown pos={sortPos} panelRef={sortPanelRef}
          sortBy={sortBy} sortDir={sortDir}
          onSort={v=>setSortBy(sortBy===v?"None":v)}
          onDir={setSortDir}/>
      )}
      {showGroup&&(
        <GroupDropdown pos={groupPos} panelRef={groupPanelRef}
          groupBy={groupBy} subGroupBy={subGroupBy}
          onGroup={v=>setGroupBy(v)}
          onSubGroup={v=>setSubGroupBy(v)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
